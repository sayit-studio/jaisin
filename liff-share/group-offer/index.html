<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>製作團購方案</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">宅心驗屋</p>
        <h1>製作團購方案</h1>
      </header>

      <section class="status" id="statusBox" role="status" aria-live="polite">
        正在準備表單。
      </section>

      <nav class="tabs" aria-label="團購工具分頁">
        <button class="tab-button is-active" type="button" data-tab="image">製作圖片</button>
        <button class="tab-button" type="button" data-tab="library">圖片資料庫</button>
      </nav>

      <section class="tab-panel is-active" id="imagePanel" data-panel="image">
      <form class="offer-form" id="offerForm">
        <div class="step-heading">
          <span>STEP 01</span>
          <div><h2>選擇建立方式</h2><p>建立新建案，或從 Notion 載入既有方案。</p></div>
        </div>
        <fieldset class="mode-field">
          <legend class="sr-only">選擇建立方式</legend>
          <label class="choice-card">
            <input type="radio" name="mode" value="create" checked>
            <span>
              <strong>新增新建案團購方案</strong>
              <small>建立新方案，輸入建案名稱後選擇海報模板。</small>
            </span>
          </label>
          <label class="choice-card">
            <input type="radio" name="mode" value="existing">
            <span>
              <strong>使用既有建案</strong>
              <small>從 Notion 既有方案選擇，再調整海報模板。</small>
            </span>
          </label>
        </fieldset>

        <section class="mode-section" id="existingSection">
          <label>
            選擇既有方案
            <select id="messageId" name="messageId">
              <option value="">讀取中...</option>
            </select>
          </label>
        </section>

        <div class="step-heading">
          <span>STEP 02</span>
          <div><h2>確認建案名稱</h2><p>名稱會直接顯示在團購海報上。</p></div>
        </div>
        <label>
          團購圖片建案名稱
          <input id="projectName" name="projectName" autocomplete="off" placeholder="新增時必填；既有方案可使用 Notion 原資料">
        </label>

        <div class="step-heading">
          <span>STEP 03</span>
          <div><h2>選擇海報樣式</h2><p>點擊預覽卡片即可單選套用。</p></div>
        </div>
        <div class="template-grid" role="radiogroup" aria-label="海報樣式">
          <label class="template-card">
            <input type="radio" name="templateStyle" value="橫條衝擊版">
            <span class="template-preview"><iframe src="../../offer-template/template-a.html" title="橫條衝擊版預覽" loading="lazy" tabindex="-1"></iframe></span>
            <strong>橫條衝擊版</strong>
          </label>
          <label class="template-card">
            <input type="radio" name="templateStyle" value="三欄比較版">
            <span class="template-preview"><iframe src="../../offer-template/template-b.html" title="三欄比較版預覽" loading="lazy" tabindex="-1"></iframe></span>
            <strong>三欄比較版</strong>
          </label>
          <label class="template-card">
            <input type="radio" name="templateStyle" value="對切海報版" checked>
            <span class="template-preview"><iframe src="../../offer-template/template-c.html" title="對切海報版預覽" loading="lazy" tabindex="-1"></iframe></span>
            <strong>對切海報版</strong>
          </label>
          <label class="template-card">
            <input type="radio" name="templateStyle" value="分房卡片版">
            <span class="template-preview"><iframe src="../../offer-template/template-d.html" title="分房卡片版預覽" loading="lazy" tabindex="-1"></iframe></span>
            <strong>分房卡片版</strong>
          </label>
        </div>

        <div class="step-heading">
          <span>STEP 04</span>
          <div><h2>確認價格與備註</h2><p>預設值可直接使用，也可展開進階資料調整。</p></div>
        </div>
        <section class="defaults-panel" aria-labelledby="defaultsTitle">
          <div class="section-title">
            <h2 id="defaultsTitle">預設帶入資料</h2>
            <p>新增方案時會依 Notion 自動化預設值產圖；取消勾選的房型不會帶入圖片。</p>
          </div>

          <div class="room-options">
            <label class="room-card">
              <input type="checkbox" name="roomTypes" value="二房" checked>
              <span>
                <strong>二房</strong>
                <small>團購價 7800 / 階梯價 7300 / 6800</small>
              </span>
            </label>

            <label class="room-card">
              <input type="checkbox" name="roomTypes" value="三房" checked>
              <span>
                <strong>三房</strong>
                <small>團購價 8800 / 階梯價 8300 / 7800</small>
              </span>
            </label>

            <label class="room-card">
              <input type="checkbox" name="roomTypes" value="四房" checked>
              <span>
                <strong>四房</strong>
                <small>團購價 10800 / 階梯價 10300 / 9800</small>
              </span>
            </label>
          </div>
        </section>

        <details class="advanced">
          <summary>進階資料</summary>

          <label>
            團購價標題
            <input id="threshold0" name="threshold0" autocomplete="off" placeholder="開團優惠價">
          </label>

          <div class="field-grid">
            <label>
              階梯價1標題
              <input id="threshold1" name="threshold1" autocomplete="off" placeholder="預約滿10戶">
            </label>
            <label>
              階梯價2標題
              <input id="threshold2" name="threshold2" autocomplete="off" placeholder="預約滿30戶">
            </label>
          </div>

          <label>
            備註1
            <textarea id="note1" name="note1" rows="2" placeholder="可留空使用 Notion 原資料"></textarea>
          </label>

          <label>
            備註2
            <textarea id="note2" name="note2" rows="2" placeholder="可留空使用 Notion 原資料"></textarea>
          </label>

          <label>
            備註3
            <textarea id="note3" name="note3" rows="2" placeholder="可留空使用 Notion 原資料"></textarea>
          </label>
        </details>

        <button class="primary-button" id="submitButton" type="submit" disabled>
          產生圖片
        </button>
      </form>

      <section class="result-panel is-hidden" id="resultPanel">
        <img id="resultImage" alt="團購方案圖片">
        <div class="actions">
          <button class="secondary-button" id="sendButton" type="button">傳送到目前聊天室</button>
          <button class="secondary-button" id="shareButton" type="button">分享給好友</button>
          <button class="download-link" id="downloadButton" type="button">下載圖片</button>
          <a class="open-link" id="downloadLink" target="_blank" rel="noreferrer">開啟原圖</a>
        </div>
      </section>
      </section>

      <section class="tab-panel" id="libraryPanel" data-panel="library">
        <div class="library-header">
          <div>
            <p class="section-kicker">NOTION PROJECTS</p>
            <h2>圖片資料庫</h2>
            <p>查看所有建案的產圖狀態、產生日期，並可直接下載或分享。</p>
          </div>
          <button class="secondary-button" id="reloadLibraryButton" type="button">重新整理</button>
        </div>
        <div class="library-summary" id="librarySummary"></div>
        <div class="project-grid" id="projectGrid" aria-live="polite"></div>
      </section>
    </main>
    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <script>
      function mergeLiffStateParams() {
        const params = new URLSearchParams(window.location.search);
        const state = params.get("liff.state");

        if (!state) {
          return params;
        }

        const normalizedState = state.startsWith("?") ? state.slice(1) : state;
        const stateParams = new URLSearchParams(normalizedState);

        for (const [key, value] of stateParams.entries()) {
          if (!params.has(key)) {
            params.set(key, value);
          }
        }

        return params;
      }

      const params = mergeLiffStateParams();
      const CONFIG = {
        liffId: params.get("liffId") || "2010234607-r7RfEvrr",
        optionsApiUrl:
          params.get("optionsApi") ||
          "https://sayitstudio.zeabur.app/webhook/zai-shin-group-offer-options",
        generateApiUrl:
          params.get("generateApi") ||
          "https://sayitstudio.zeabur.app/webhook/zai-shin-group-offer-generate",
        debug: params.get("debug") === "1"
      };

      const state = {
        initialized: false,
        imageUrl: "",
        imageFileName: "宅心驗屋團購方案.png",
        options: []
      };

      const statusBox = document.querySelector("#statusBox");
      const offerForm = document.querySelector("#offerForm");
      const submitButton = document.querySelector("#submitButton");
      const messageId = document.querySelector("#messageId");
      const projectName = document.querySelector("#projectName");
      const templateInputs = document.querySelectorAll("input[name='templateStyle']");
      const existingSection = document.querySelector("#existingSection");
      const modeInputs = document.querySelectorAll("input[name='mode']");
      const resultPanel = document.querySelector("#resultPanel");
      const resultImage = document.querySelector("#resultImage");
      const sendButton = document.querySelector("#sendButton");
      const shareButton = document.querySelector("#shareButton");
      const downloadButton = document.querySelector("#downloadButton");
      const downloadLink = document.querySelector("#downloadLink");
      const tabButtons = document.querySelectorAll("[data-tab]");
      const tabPanels = document.querySelectorAll("[data-panel]");
      const reloadLibraryButton = document.querySelector("#reloadLibraryButton");
      const librarySummary = document.querySelector("#librarySummary");
      const projectGrid = document.querySelector("#projectGrid");
      const toastRegion = document.querySelector("#toastRegion");

      function showToast(message, tone = "default") {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.dataset.tone = tone;
        toast.textContent = message;
        toastRegion.append(toast);
        requestAnimationFrame(() => toast.classList.add("is-visible"));
        window.setTimeout(() => {
          toast.classList.remove("is-visible");
          window.setTimeout(() => toast.remove(), 250);
        }, 3200);
      }

      function setStatus(message, tone = "default", notify = false) {
        statusBox.textContent = message;
        statusBox.dataset.tone = tone;
        if (notify || tone === "success" || tone === "warning" || tone === "error") showToast(message, tone);
      }

      function setActiveTab(tabName) {
        for (const button of tabButtons) {
          button.classList.toggle("is-active", button.dataset.tab === tabName);
        }

        for (const panel of tabPanels) {
          panel.classList.toggle("is-active", panel.dataset.panel === tabName);
        }
      }

      function fillFormFromSelectedOption() {
        if (getSelectedMode() !== "existing") {
          return;
        }

        const selected = state.options.find((item) => item.messageId === messageId.value);

        projectName.value = selected?.projectName || "";
        setTemplateStyle(selected?.templateStyle || "對切海報版");
      }

      function setTemplateStyle(value) {
        const fallback = "對切海報版";
        const matched = Array.from(templateInputs).find((input) => input.value === value);
        const target = matched || Array.from(templateInputs).find((input) => input.value === fallback);
        if (target) target.checked = true;
      }

      function getSelectedMode() {
        return document.querySelector("input[name='mode']:checked")?.value || "create";
      }

      function updateModeView() {
        const mode = getSelectedMode();

        existingSection.classList.toggle("is-hidden", mode !== "existing");
        messageId.required = mode === "existing";
        projectName.required = mode === "create";

        if (mode === "create") {
          messageId.value = "";
          projectName.value = "";
          setStatus("請輸入新建案名稱並選擇海報樣式。", "success");
        } else {
          fillFormFromSelectedOption();
          setStatus("請選擇既有方案並確認海報樣式。", "success");
        }
      }

      async function loadOptions() {
        const response = await fetch(CONFIG.optionsApiUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("方案清單讀取失敗。");
        }

        const payload = await response.json();
        state.options = Array.isArray(payload.items) ? payload.items : [];
        messageId.innerHTML = "";

        if (!state.options.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "目前沒有可用方案";
          messageId.append(option);
          return;
        }

        for (const item of state.options) {
          const option = document.createElement("option");
          option.value = item.messageId;
          option.textContent = `${item.name}｜${item.messageId}`;
          messageId.append(option);
        }

        fillFormFromSelectedOption();
        submitButton.disabled = false;
        renderProjectLibrary();
      }

      function getGeneratedDate(item) {
        const explicit = item.generatedAt || item.imageGeneratedAt || item.updatedAt || "";
        if (explicit) {
          const date = new Date(explicit);
          if (!Number.isNaN(date.getTime())) return date;
        }
        const match = String(item.imageUrl || "").match(/-(\d{13})\.png(?:\?|$)/i);
        if (match) {
          const date = new Date(Number(match[1]));
          if (!Number.isNaN(date.getTime())) return date;
        }

        const idDate = String(item.messageId || "").match(/^(\d{4})(\d{2})(\d{2})/);
        if (idDate) {
          const date = new Date(idDate[1] + "-" + idDate[2] + "-" + idDate[3] + "T12:00:00+08:00");
          if (!Number.isNaN(date.getTime())) return date;
        }
        return null;
      }

      function formatDate(date) {
        if (!date) return "尚無日期紀錄";
        return new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function imageFileName(item) {
        const fromUrl = String(item.imageUrl || "").split("/").pop()?.split("?")[0];
        return fromUrl || (item.messageId || "宅心驗屋") + "-團購方案.png";
      }

      function renderProjectLibrary() {
        if (!projectGrid) return;
        projectGrid.innerHTML = "";
        const generatedCount = state.options.filter((item) => Boolean(item.imageUrl)).length;
        librarySummary.innerHTML = "";
        for (const [label, value] of [
          ["全部建案", state.options.length],
          ["已產生圖片", generatedCount],
          ["尚未產生", state.options.length - generatedCount]
        ]) {
          const block = document.createElement("div");
          const strong = document.createElement("strong");
          const span = document.createElement("span");
          strong.textContent = value;
          span.textContent = label;
          block.append(strong, span);
          librarySummary.append(block);
        }

        if (!state.options.length) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "目前尚未讀取到 Notion 建案資料。";
          projectGrid.append(empty);
          return;
        }

        for (const item of state.options) {
          const generated = Boolean(item.imageUrl);
          const card = document.createElement("article");
          card.className = "project-card";
          const media = document.createElement("div");
          media.className = "project-media";

          if (generated) {
            const image = document.createElement("img");
            image.src = item.imageUrl;
            image.alt = (item.projectName || item.name || "建案") + "團購方案";
            image.loading = "lazy";
            media.append(image);
          } else {
            const placeholder = document.createElement("span");
            placeholder.textContent = "尚未產生圖片";
            media.append(placeholder);
          }

          const body = document.createElement("div");
          body.className = "project-body";
          const titleRow = document.createElement("div");
          titleRow.className = "project-title-row";
          const title = document.createElement("h3");
          title.textContent = item.projectName || item.name || item.messageId;
          const badge = document.createElement("span");
          badge.className = "status-badge " + (generated ? "is-generated" : "is-pending");
          badge.textContent = generated ? "已產生" : "未產生";
          titleRow.append(title, badge);

          const meta = document.createElement("dl");
          for (const [label, value] of [
            ["Message ID", item.messageId || "-"],
            ["產生日期", generated ? formatDate(getGeneratedDate(item)) : "-"]
          ]) {
            const dt = document.createElement("dt");
            const dd = document.createElement("dd");
            dt.textContent = label;
            dd.textContent = value;
            meta.append(dt, dd);
          }

          const actions = document.createElement("div");
          actions.className = "project-actions";
          if (generated) {
            const download = document.createElement("button");
            download.type = "button";
            download.className = "secondary-button";
            download.textContent = "下載";
            download.addEventListener("click", () => downloadImage(item.imageUrl, imageFileName(item)));
            const share = document.createElement("button");
            share.type = "button";
            share.className = "primary-button";
            share.textContent = "轉發好友";
            share.addEventListener("click", () => shareImageToFriends(item.imageUrl));
            actions.append(download, share);
          } else {
            const create = document.createElement("button");
            create.type = "button";
            create.className = "secondary-button";
            create.textContent = "前往製作";
            create.addEventListener("click", () => {
              setActiveTab("image");
              const existingMode = document.querySelector("input[name='mode'][value='existing']");
              existingMode.checked = true;
              updateModeView();
              messageId.value = item.messageId;
              fillFormFromSelectedOption();
              window.scrollTo({ top: 0, behavior: "smooth" });
              showToast("已載入「" + (item.projectName || item.name) + "」。", "success");
            });
            actions.append(create);
          }
          body.append(titleRow, meta, actions);
          card.append(media, body);
          projectGrid.append(card);
        }
      }
      async function initLiff() {
        if (!window.liff) {
          throw new Error("LIFF SDK 尚未載入。");
        }

        if (!CONFIG.liffId || CONFIG.liffId === "YOUR_GROUP_OFFER_LIFF_ID") {
          if (CONFIG.debug) {
            return;
          }

          throw new Error("尚未設定 LIFF ID。");
        }

        await liff.init({ liffId: CONFIG.liffId });
        state.initialized = true;

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
      }

      function getFormPayload() {
        const formData = new FormData(offerForm);
        const roomTypes = Array.from(offerForm.querySelectorAll("input[name='roomTypes']:checked"))
          .map((input) => input.value);

        return {
          mode: String(formData.get("mode") || "create").trim(),
          messageId: String(formData.get("messageId") || "").trim(),
          projectName: String(formData.get("projectName") || "").trim(),
          templateStyle: String(formData.get("templateStyle") || "對切海報版").trim(),
          roomTypes,
          thresholds: [
            String(formData.get("threshold0") || "").trim(),
            String(formData.get("threshold1") || "").trim(),
            String(formData.get("threshold2") || "").trim()
          ],
          notes: [
            String(formData.get("note1") || "").trim(),
            String(formData.get("note2") || "").trim(),
            String(formData.get("note3") || "").trim()
          ],
          lineUserId:
            state.initialized && liff.isLoggedIn() && liff.getContext()
              ? liff.getContext().userId || ""
              : ""
        };
      }

      async function generateImage(event) {
        event.preventDefault();
        const mode = getSelectedMode();

        if (mode === "create" && !projectName.value.trim()) {
          setStatus("新增新建案團購方案時，請先輸入建案名稱。", "error");
          projectName.focus();
          return;
        }

        if (mode === "existing" && !messageId.value.trim()) {
          setStatus("使用既有建案時，請先選擇方案。", "error");
          messageId.focus();
          return;
        }

        submitButton.disabled = true;
        resultPanel.classList.add("is-hidden");
        setStatus("正在產生圖片，請稍候。");

        try {
          const payload = getFormPayload();
          const encodedPayload = new URLSearchParams();

          for (const [key, value] of Object.entries(payload)) {
            encodedPayload.set(key, Array.isArray(value) ? JSON.stringify(value) : value);
          }

          const response = await fetch(CONFIG.generateApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: encodedPayload.toString()
          });

          const result = await response.json();

          if (!response.ok || !result.ok || !result.imageUrl) {
            throw new Error(result.message || "圖片產生失敗。");
          }

          state.imageUrl = result.imageUrl;
          state.imageFileName = result.githubFilePath
            ? result.githubFilePath.split("/").pop()
            : (result.messageId || "宅心驗屋") + "-團購方案.png";
          resultImage.src = result.imageUrl;
          downloadLink.href = result.imageUrl;
          resultPanel.classList.remove("is-hidden");
          setStatus("圖片已產生並完成紀錄。", "success", true);
          await loadOptions();

          await sendImageToChat();
        } catch (error) {
          console.error(error);
          setStatus(error.message || "圖片產生失敗。", "error");
        } finally {
          submitButton.disabled = false;
        renderProjectLibrary();
        }
      }

      async function downloadImage(imageUrl = state.imageUrl, fileName = state.imageFileName) {
        if (!imageUrl) {
          setStatus("請先產生圖片。", "warning");
          return;
        }
        downloadButton.disabled = true;
        setStatus("正在準備下載圖片。");
        try {
          const response = await fetch(imageUrl, { cache: "no-store" });
          if (!response.ok) throw new Error("圖片下載失敗。");
          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = objectUrl;
          anchor.download = fileName;
          document.body.append(anchor);
          anchor.click();
          anchor.remove();
          window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
          setStatus("圖片已開始下載。", "success", true);
        } catch (error) {
          console.error(error);
          window.open(imageUrl, "_blank", "noopener,noreferrer");
          setStatus("無法自動下載，已為你開啟原圖，可長按圖片儲存。", "warning");
        } finally {
          downloadButton.disabled = false;
        }
      }

      async function shareImageToFriends(imageUrl = state.imageUrl) {
        if (!imageUrl) {
          setStatus("請先產生圖片。", "warning");
          return;
        }
        if (!state.initialized || !liff.isLoggedIn()) {
          setStatus("請從 LINE 內開啟此工具後再分享給好友。", "warning");
          return;
        }
        if (!liff.isApiAvailable("shareTargetPicker")) {
          setStatus("目前 LINE 環境不支援好友分享，請改用傳送到聊天室。", "warning");
          return;
        }
        shareButton.disabled = true;
        setStatus("正在開啟好友選擇畫面。");
        try {
          const result = await liff.shareTargetPicker([
            {
              type: "image",
              originalContentUrl: imageUrl,
              previewImageUrl: imageUrl
            },
            { type: "text", text: "宅心驗屋團購方案" }
          ]);
          setStatus(result ? "圖片已分享。" : "已取消分享。", result ? "success" : "warning", true);
        } catch (error) {
          console.error(error);
          setStatus("分享失敗，請稍後再試。", "error");
        } finally {
          shareButton.disabled = false;
        }
      }
      async function sendImageToChat() {
        if (!state.imageUrl) {
          return;
        }

        if (!state.initialized || !liff.isInClient()) {
          setStatus("圖片已產生，可開啟圖片下載；目前環境不是 LINE 內建瀏覽器，無法自動傳送。", "warning");
          return;
        }

        try {
          await liff.sendMessages([
            {
              type: "image",
              originalContentUrl: state.imageUrl,
              previewImageUrl: state.imageUrl
            },
            {
              type: "text",
              text: "團購方案圖片已產生，可長按圖片儲存或轉傳。"
            }
          ]);
          setStatus("圖片已送回聊天室。", "success", true);
        } catch (error) {
          console.error(error);
          setStatus("圖片已產生，但傳送到聊天室失敗，請改用開啟圖片。", "warning");
        }
      }

      messageId.addEventListener("change", fillFormFromSelectedOption);
      for (const input of modeInputs) {
        input.addEventListener("change", updateModeView);
      }
      for (const button of tabButtons) {
        button.addEventListener("click", () => setActiveTab(button.dataset.tab));
      }
      offerForm.addEventListener("submit", generateImage);
      sendButton.addEventListener("click", sendImageToChat);
      shareButton.addEventListener("click", () => shareImageToFriends());
      downloadButton.addEventListener("click", () => downloadImage());
      reloadLibraryButton.addEventListener("click", async () => {
        reloadLibraryButton.disabled = true;
        setStatus("正在重新讀取 Notion 建案資料。");
        try {
          await loadOptions();
          setStatus("圖片資料庫已更新。", "success", true);
        } catch (error) {
          console.error(error);
          setStatus(error.message || "資料庫更新失敗。", "error", true);
        } finally {
          reloadLibraryButton.disabled = false;
        }
      });

      (async () => {
        try {
          setStatus("正在初始化 LIFF。");
          await initLiff();
          setStatus("正在讀取方案清單。");
          await loadOptions();
          updateModeView();
        } catch (error) {
          console.error(error);
          setStatus(error.message || "初始化失敗。", "error");

          if (CONFIG.debug) {
            try {
              await loadOptions();
              submitButton.disabled = false;
            } catch (loadError) {
              console.error(loadError);
            }
          }
        }
      })();
    </script>
  </body>
</html>
