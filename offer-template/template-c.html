<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 文宣海報</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--cream); }
    .poster { position: relative; width: 1415px; height: 2000px; background: var(--cream); overflow: hidden; }

    /* ── Navy diagonal zone ── */
    .navy-zone {
      position: absolute; top: 0; left: 0;
      width: 1415px; height: 720px;
      background: var(--navy);
      clip-path: polygon(0 0, 100% 0, 100% 76%, 0 96%);
    }

    /* ── Brand header ── */
    .top-brand {
      position: absolute; top: 52px; left: 112px;
      display: flex; align-items: center; gap: 40px;
    }
    #brandLogo { width: 112px; height: 112px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line {
      font-size: 36px; font-weight: 400;
      color: rgba(255,255,255,0.78); letter-spacing: 5px;
    }

    /* ── Building name ── */
    .project-block {
      position: absolute; top: 240px; left: 112px; width: 900px;
    }
    .project-eyebrow {
      font-size: 26px; font-weight: 400;
      color: rgba(255,211,90,0.62); letter-spacing: 9px; margin-bottom: 24px;
    }
    #projectName {
      display: block; font-size: 156px; font-weight: 900;
      color: #fff; letter-spacing: 16px; line-height: 1.0; margin-bottom: 32px;
    }
    .project-sub {
      display: inline-block;
      border: 3px solid rgba(255,211,90,0.5); color: var(--yellow);
      font-size: 30px; font-weight: 500;
      padding: 10px 40px; border-radius: 50px; letter-spacing: 5px;
    }

    /* ── Mascot ── */
    .mascot-float {
      position: absolute; top: 200px; right: 40px;
      width: 360px; max-height: 560px;
      object-fit: contain; object-position: bottom;
    }

    /* ── Yellow band ── */
    .yellow-band {
      position: absolute; top: 708px; left: 0;
      width: 1415px; height: 92px;
      background: var(--yellow);
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .yellow-band-text {
      font-size: 42px; font-weight: 900;
      color: var(--navy); letter-spacing: 10px;
    }

    /* ── Price section ── */
    .price-section {
      position: absolute; top: 832px; left: 112px; width: 1191px;
    }

    /* Tier group */
    .tier-group { position: relative; margin-bottom: 36px; }
    .tier-label {
      font-size: 34px; font-weight: 700; color: var(--navy);
      letter-spacing: 4px; margin-bottom: 16px;
    }

    /* Hot group: navy box + corner badge */
    .tier-group.is-hot {
      background: var(--navy);
      border-radius: 20px;
      padding: 28px 32px 24px 32px;
      margin-bottom: 36px;
    }
    .tier-group.is-hot .tier-label { color: var(--yellow); margin-bottom: 16px; }

    /* Corner badge */
    .hot-corner-badge {
      position: absolute; top: 0; right: 0;
      background: var(--yellow); color: var(--navy);
      font-size: 22px; font-weight: 900; letter-spacing: 2px;
      padding: 10px 24px;
      border-radius: 0 20px 0 20px;
    }

    /* Room grid: 2 columns */
    .room-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px;
    }
    .room-cell {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(13,35,64,0.1);
    }
    .room-cell:nth-last-child(1),
    .room-cell:nth-last-child(2) { border-bottom: none; }
    .tier-group.is-hot .room-cell { border-bottom-color: rgba(255,211,90,0.15); }

    .rc-room {
      font-size: 28px; font-weight: 700; color: var(--navy);
      flex-shrink: 0; min-width: 70px;
    }
    .rc-leader {
      flex: 1; height: 0;
      border-top: 2px dashed rgba(13,35,64,0.18);
      margin-bottom: 4px;
    }
    .rc-price { font-size: 58px; font-weight: 900; color: var(--navy); }

    .tier-group.is-hot .rc-room { color: rgba(255,255,255,0.75); }
    .tier-group.is-hot .rc-leader { border-top-color: rgba(255,211,90,0.25); }
    .tier-group.is-hot .rc-price { color: var(--yellow); font-size: 64px; }

    /* ── Notes ── */
    .notes-area { position: absolute; left: 112px; width: 1191px; top: 1740px; }
    .note-item { font-size: 27px; color: var(--blue-grey); line-height: 1.68; margin-bottom: 8px; }
    .note-item::before { content: "★ "; }
    .note-item strong { color: var(--navy); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      position: absolute; bottom: 0; left: 0; width: 1415px; height: 168px;
      background: var(--navy); display: flex; align-items: center; justify-content: center;
    }
    .wordmark {
      font-size: 62px; font-weight: 500; color: #fff;
      border-bottom: 10px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="navy-zone"></div>

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-sub">欲報名請私訊官方 LINE</div>
      </div>

      <img class="mascot-float" src="./assets/ip.png" alt="">

      <div class="yellow-band">
        <span class="yellow-band-text">▌ 驗屋報價一覽 ▌</span>
      </div>

      <div class="price-section" id="priceSection"></div>
      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1; // 預約滿10戶 永遠是 index 1

      var q = function (id) { return document.getElementById(id); };
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      var noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price section: one tier group per threshold
      var section = q("priceSection");
      if (section) {
        thresholds.forEach(function (threshold, colIdx) {
          var isHot = (colIdx === HOT_IDX);

          var group = document.createElement("div");
          group.className = "tier-group" + (isHot ? " is-hot" : "");

          // Corner badge for hot
          if (isHot) {
            var badge = document.createElement("div");
            badge.className = "hot-corner-badge";
            badge.textContent = "★ 熱門方案";
            group.appendChild(badge);
          }

          // Tier label
          var label = document.createElement("div");
          label.className = "tier-label";
          label.textContent = threshold;
          group.appendChild(label);

          // Room grid
          var grid = document.createElement("div");
          grid.className = "room-grid";
          prices.forEach(function (row) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var cell = document.createElement("div");
            cell.className = "room-cell";
            cell.innerHTML =
              '<span class="rc-room">' + row.room + '</span>' +
              '<span class="rc-leader"></span>' +
              '<span class="rc-price">' + formatPrice(val) + '</span>';
            grid.appendChild(cell);
          });
          group.appendChild(grid);
          section.appendChild(group);
        });

        // 動態調整備註位置
        requestAnimationFrame(function () {
          var bottom = section.offsetTop + section.offsetHeight;
          if (noteList) noteList.style.top = Math.max(bottom + 40, 1700) + 'px';
        });
      }
    })();
  </script>
</body>
</html>
