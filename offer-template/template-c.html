<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 文宣海報</title>
  <style>
    /* c-template-version: 20260515-title-box-v2 */
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --light: #E9ECEF;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster {
      width: 1415px; height: 2000px; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Main body: left + right split ── */
    .main-body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Left panel (navy) ── */
    .left-panel {
      background: var(--navy);
      width: 300px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 42px 22px 0;
    }
    .left-logo { width: 230px; height: 230px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .left-service {
      display: none;
    }
    .left-divider {
      width: 100%; height: 2px; background: rgba(255,211,90,0.2);
      margin: 30px 0 28px; flex-shrink: 0;
    }
    .left-eyebrow {
      display: none;
      writing-mode: horizontal-tb; text-orientation: mixed;
      font-size: 28px; font-weight: 900; line-height: 1;
      color: rgba(255,211,90,0.82); letter-spacing: 0;
      white-space: nowrap; flex-shrink: 0;
    }
    #projectName {
      display: flex; width: 244px; height: 840px;
      align-items: center; justify-content: center;
      font-size: 132px; font-weight: 900;
      color: #fff; letter-spacing: 8px; line-height: 1.06;
      writing-mode: vertical-rl; text-orientation: upright;
      overflow: visible; text-align: center; white-space: nowrap;
      margin-top: 74px;
    }
    .left-sub {
      display: none;
      margin-top: 28px;
      border: 3px solid rgba(255,211,90,0.45); color: var(--yellow);
      font-size: 30px; font-weight: 600;
      padding: 12px 28px; border-radius: 40px; letter-spacing: 4px;
    }
    .left-mascot {
      flex: 1; overflow: hidden;
      margin-top: 24px; margin-left: -22px; margin-right: -22px;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .left-mascot img {
      width: 108%;
      object-fit: contain; object-position: bottom;
    }

    /* ── Right panel (cream) ── */
    .right-panel {
      background: var(--cream);
      flex: 1; display: flex; flex-direction: column;
      padding: 44px 32px 0;
    }
    .right-eyebrow {
      text-align: center;
      font-size: 46px; font-weight: 900;
      color: rgba(13,35,64,0.72);
      letter-spacing: 6px; line-height: 1;
      margin: 0 0 18px; flex-shrink: 0;
    }
    .brand-slogan {
      width: 100%;
      text-align: center;
      font-size: 116px; font-weight: 900;
      color: var(--navy);
      letter-spacing: 3px; line-height: 1.1;
      margin: 0 0 24px; flex-shrink: 0;
      text-shadow: 0 4px 18px rgba(13,35,64,0.12);
      white-space: nowrap;
    }
    .right-header {
      font-size: 62px; font-weight: 900;
      color: var(--navy); letter-spacing: 8px;
      padding-bottom: 18px;
      border-bottom: 6px solid var(--yellow);
      margin-bottom: 26px; flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
    }
    .tax-note {
      font-size: 32px; font-weight: 800;
      color: var(--blue-grey); letter-spacing: 3px;
      white-space: nowrap; padding-bottom: 6px;
    }

    /* Room list */
    .room-list {
      flex: 1; display: flex; flex-direction: column;
      gap: 22px; padding-bottom: 24px;
    }
    .room-row {
      display: flex; flex-direction: column;
      position: relative;
      min-height: 0; border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .room-header {
      background: var(--navy); padding: 20px 32px;
      font-size: 62px; font-weight: 900;
      color: #fff; letter-spacing: 8px;
      border-bottom: 5px solid var(--yellow);
      flex-shrink: 0;
    }
    .tiers-grid {
      display: flex; flex: 1; background: #fff;
    }
    .tier-cell {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 16px;
      border-right: 2px solid var(--light);
      position: relative;
    }
    .tier-cell:last-child { border-right: none; }
    .tier-name {
      font-size: 42px; font-weight: 800;
      color: var(--navy); letter-spacing: 2px; margin-bottom: 10px;
    }
    .tier-price {
      font-size: 96px; font-weight: 900;
      color: var(--navy); line-height: 1;
      white-space: nowrap; overflow: hidden; max-width: 100%;
    }

    /* 10戶 熱門：毛玻璃立體效果 */
    .tier-cell.is-hot {
      background: linear-gradient(160deg, rgba(13,35,64,0.92) 0%, rgba(18,48,90,0.88) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,211,90,0.3);
      border: 1px solid rgba(255,211,90,0.35);
      z-index: 2; position: relative;
    }
    .tier-cell.is-hot .tier-name { color: rgba(255,211,90,0.75); }
    .tier-cell.is-hot .tier-price { color: var(--yellow); }
    .hot-corner {
      position: absolute; top: 0; right: 0;
      background: var(--yellow); color: var(--navy);
      font-size: 34px; font-weight: 900; letter-spacing: 2px;
      padding: 6px 18px; border-radius: 0 16px 0 12px;
      z-index: 5;
    }

    /* ── Footer (navy full-width) ── */
    .footer {
      display: none;
      background: var(--navy); flex-shrink: 0; height: 178px;
      display: flex; align-items: center;
      padding: 0 60px; justify-content: space-between;
      border-top: 2px solid rgba(255,211,90,0.18);
    }
    .footer-brand { display: flex; align-items: center; gap: 22px; }
    .footer-logo { width: 96px; height: 96px; object-fit: contain; }
    .wordmark {
      font-size: 56px; font-weight: 500; color: #fff;
      border-bottom: 8px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .footer-notes {
      display: flex; flex-direction: column; gap: 8px; flex: 1; margin-left: 54px;
    }
    .right-panel .footer-notes {
      flex: 0 0 auto; margin-left: 0; padding: 12px 0 28px; gap: 10px;
    }
    .note-item {
      font-size: 32px; font-weight: 700;
      color: rgba(255,255,255,0.66); line-height: 1.35;
      padding-left: 18px; border-left: 4px solid var(--yellow);
    }
    .right-panel .note-item {
      color: var(--blue-grey);
      border-left-width: 5px;
    }
    .right-panel .note-item strong { color: var(--navy); }
    .note-item strong { color: rgba(255,255,255,0.75); font-weight: 700; }
    .is-hidden { display: none !important; }
    footer.footer { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="main-body">

        <!-- Left: brand panel -->
        <div class="left-panel">
          <img class="left-logo" id="brandLogo" alt="宅心驗屋">
          <div id="logoFallback"></div>
          <div class="left-service">宅心驗屋 傾聽你心</div>
          <div class="left-divider"></div>
          <div class="left-eyebrow">社 區 限 定</div>
          <strong id="projectName">建案專屬</strong>
          <div class="left-sub">欲報名請私訊官方 LINE</div>
          <div class="left-mascot">
            <img src="./assets/ip.png" alt="">
          </div>
        </div>

        <!-- Right: price panel -->
        <div class="right-panel">
          <div class="brand-slogan">宅心驗屋</div>
          <div class="right-eyebrow">社區專屬限定優惠</div>
          <div class="right-header">
            <span>▌ 驗屋報價一覽 ▌</span>
            <span class="tax-note">以下皆為未稅價</span>
          </div>
          <div class="room-list" id="roomList"></div>
          <div class="footer-notes" id="noteList"></div>
        </div>

      </div>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-brand">
          <img class="footer-logo" src="./assets/logo.png" alt="">
          <div class="wordmark">宅心<strong>驗屋</strong></div>
        </div>
        <div class="footer-notes"></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1;

      var q = function (id) { return document.getElementById(id); };
      var serviceEl = document.querySelector('.left-service');
      var eyebrowEl = document.querySelector('.left-eyebrow');
      var rightEyebrowEl = document.querySelector('.right-eyebrow');
      if (serviceEl) serviceEl.textContent = '宅心驗屋 傾聽你心';
      if (eyebrowEl) eyebrowEl.textContent = '社區限定專屬優惠';

      // 建案名稱：依字數自動縮小，禁止斷行
      var nameEl = q('projectName');
      if (serviceEl) serviceEl.textContent = '';
      if (eyebrowEl) eyebrowEl.textContent = '\u793e\u5340\u9650\u5b9a\u5c08\u5c6c\u512a\u60e0';
      if (rightEyebrowEl) rightEyebrowEl.textContent = '\u793e\u5340\u5c08\u5c6c\u9650\u5b9a\u512a\u60e0';
      if (nameEl) {
        var name = data.projectName || '建案專屬';
        nameEl.textContent = name;
        var n = name.length;
        var maxTitleH = 840;
        var fs = Math.floor((maxTitleH * 0.90 - (n - 1) * 8) / n);
        nameEl.style.fontSize = Math.min(132, Math.max(62, fs)) + 'px';
      }

      setImage(q('brandLogo'), q('logoFallback'), data.brandLogo || './assets/brand-mark.png');

      // Notes（in footer）
      var noteList = q('noteList');
      if (noteList) {
        (data.notes || []).slice(0, 3).forEach(function (note) {
          var p = document.createElement('p');
          p.className = 'note-item';
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Room list: one row per room, tiers horizontally
      var roomList = q('roomList');
      if (roomList) {
        prices.forEach(function (row) {
          var roomRow = document.createElement('div');
          roomRow.className = 'room-row';

          var header = document.createElement('div');
          header.className = 'room-header';
          header.textContent = row.room;
          roomRow.appendChild(header);

          var tiersEl = document.createElement('div');
          tiersEl.className = 'tiers-grid';

          thresholds.forEach(function (threshold, colIdx) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var isHot = (colIdx === HOT_IDX);
            var cell = document.createElement('div');
            cell.className = 'tier-cell' + (isHot ? ' is-hot' : '');
            if (isHot) {
              var corner = document.createElement('div');
              corner.className = 'hot-corner';
              corner.textContent = '★ 熱門方案';
              cell.appendChild(corner);
            }
            cell.innerHTML += (
              '<div class="tier-name">' + threshold + '</div>' +
              '<div class="tier-price">' + formatPrice(val) + '</div>'
            );
            tiersEl.appendChild(cell);
          });

          roomRow.appendChild(tiersEl);
          roomList.appendChild(roomRow);
        });

        roomList.innerHTML = '';
        thresholds.forEach(function (threshold, colIdx) {
          var isHot = (colIdx === HOT_IDX);
          var thresholdRow = document.createElement('div');
          thresholdRow.className = 'room-row';

          var thresholdHeader = document.createElement('div');
          thresholdHeader.className = 'room-header';
          thresholdHeader.textContent = threshold;
          thresholdRow.appendChild(thresholdHeader);

          var thresholdGrid = document.createElement('div');
          thresholdGrid.className = 'tiers-grid';
          prices.forEach(function (row) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var cell = document.createElement('div');
            cell.className = 'tier-cell' + (isHot ? ' is-hot' : '');
            if (false) {
              var corner = document.createElement('div');
              corner.className = 'hot-corner';
              corner.textContent = '熱門方案';
              thresholdRow.appendChild(corner);
            }
            cell.innerHTML += (
              '<div class="tier-name">' + row.room + '</div>' +
              '<div class="tier-price">' + formatPrice(val) + '</div>'
            );
            thresholdGrid.appendChild(cell);
          });

          thresholdRow.appendChild(thresholdGrid);
          if (isHot) {
            var corner = document.createElement('div');
            corner.className = 'hot-corner';
            corner.textContent = '熱門方案';
            thresholdRow.appendChild(corner);
          }
          roomList.appendChild(thresholdRow);
        });

        // ── 動態填滿：依房型數量計算每列高度與字體大小 ──
        var numRooms = thresholds.length;
        if (numRooms > 0) {
          // 海報固定 1415×2000，依 CSS 結構推算可用高度
          var POSTER_H       = 2000;
          var FOOTER_H       = 0;
          var RIGHT_PAD_TOP  = 44;
          var RIGHT_HEADER_H = 248;
          var NOTES_H        = 250;
          var LIST_PAD_B     = 24;
          var ROW_GAP        = 22;
          var ROW_HEADER_H   = 122;

          var availH = POSTER_H - FOOTER_H - RIGHT_PAD_TOP - RIGHT_HEADER_H - NOTES_H - LIST_PAD_B;
          var rowH   = Math.floor((availH - ROW_GAP * (numRooms - 1)) / numRooms);
          var tierH  = rowH - ROW_HEADER_H;

          // 寬度限制：右側面板 951px 內容寬 ÷ numCols − 格子內距 32px
          var numCols = prices.length || 3;
          var cellContentW = Math.floor((1415 - 300 - 64) / numCols) - 32;
          // "$10,800" ≈ 7 字元 × ~0.6em，係數 4.0 確保不溢出
          var maxByWidth = Math.floor(cellContentW / 4.0);
          var priceMin = numCols >= 4 ? 44 : 86;
          var nameMin = numCols >= 4 ? 30 : 42;
          var priceSize = Math.max(priceMin, Math.min(Math.floor(tierH * 0.48), maxByWidth));
          var nameSize  = Math.max(nameMin, Math.min(Math.floor(tierH * 0.16), Math.floor(maxByWidth * 0.5)));

          // 套用每列高度
          var rows = roomList.querySelectorAll('.room-row');
          rows.forEach(function(r) {
            r.style.height = rowH + 'px';
            r.style.flex   = 'none';
          });

          // 動態字體（!important 確保覆蓋 CSS 固定值）
          var dynStyle = document.createElement('style');
          dynStyle.textContent =
            '.tier-name { font-size: ' + nameSize + 'px !important; margin-bottom: ' + Math.round(nameSize * 0.4) + 'px !important; }' +
            '.tier-price { font-size: ' + priceSize + 'px !important; }' +
            '.tier-cell.is-hot .tier-price { font-size: ' + Math.round(priceSize * 1.06) + 'px !important; }';
          document.head.appendChild(dynStyle);
        }
      }
    })();
  </script>
</body>
</html>
