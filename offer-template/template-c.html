<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 文宣海報</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --light: #E9ECEF;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell {
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--cream);
    }
    .poster {
      position: relative;
      width: 1415px;
      height: 2000px;
      background: var(--cream);
      overflow: hidden;
    }

    /* ── Navy zone with diagonal bottom (no side accent) ── */
    .navy-zone {
      position: absolute;
      top: 0; left: 0;
      width: 1415px;
      height: 960px;
      background: var(--navy);
      clip-path: polygon(0 0, 100% 0, 100% 78%, 0 100%);
    }

    /* ── Brand header ── */
    .top-brand {
      position: absolute;
      top: 70px;
      left: 112px;
      display: flex;
      align-items: center;
      gap: 44px;
    }
    #brandLogo { width: 148px; height: 148px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line {
      font-size: 38px;
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      letter-spacing: 5px;
    }

    /* ── Building name ── */
    .project-block {
      position: absolute;
      top: 285px;
      left: 112px;
      width: 1060px;
    }
    .project-eyebrow {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,211,90,0.62);
      letter-spacing: 9px;
      margin-bottom: 28px;
    }
    #projectName {
      display: block;
      font-size: 148px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 16px;
      line-height: 1.0;
      margin-bottom: 40px;
    }
    .project-sub {
      display: inline-block;
      border: 3px solid rgba(255,211,90,0.5);
      color: var(--yellow);
      font-size: 30px;
      font-weight: 500;
      padding: 10px 44px;
      border-radius: 50px;
      letter-spacing: 5px;
    }

    /* ── Mascot (right side of navy zone, no bg issues with transparent png) ── */
    .mascot-float {
      position: absolute;
      top: 410px;
      right: 88px;
      width: 230px;
      object-fit: contain;
    }

    /* ── Yellow band ── */
    .yellow-band {
      position: absolute;
      top: 870px;
      left: 0;
      width: 1415px;
      height: 100px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .yellow-band-text {
      font-size: 44px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 10px;
    }

    /* ── Price section: one card per threshold ── */
    .price-section {
      position: absolute;
      top: 1010px;
      left: 72px;
      width: 1271px;
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    .threshold-card {
      flex: 1;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 3px 20px rgba(13,35,64,0.07);
    }
    .threshold-card.is-best { background: var(--navy); }

    .card-header {
      padding: 26px 20px 22px;
      text-align: center;
      background: rgba(82,108,142,0.07);
      border-bottom: 3px solid var(--light);
    }
    .threshold-card.is-best .card-header {
      background: rgba(255,211,90,0.12);
      border-bottom: 3px solid rgba(255,211,90,0.25);
    }
    .card-header-label {
      font-size: 30px;
      font-weight: 700;
      color: var(--blue-grey);
      letter-spacing: 2px;
    }
    .threshold-card.is-best .card-header-label { color: var(--yellow); }
    .card-best-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--navy);
      font-size: 22px;
      font-weight: 700;
      padding: 4px 18px;
      border-radius: 20px;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .card-rows { padding: 8px 0; }
    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 28px 32px;
      border-bottom: 1px solid var(--light);
    }
    .card-price-row:last-child { border-bottom: none; }
    .threshold-card.is-best .card-price-row {
      border-bottom-color: rgba(255,211,90,0.13);
    }
    .row-room {
      font-size: 44px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 4px;
    }
    .threshold-card.is-best .row-room { color: rgba(255,255,255,0.82); }
    .row-price {
      font-size: 58px;
      font-weight: 900;
      color: var(--navy);
    }
    .threshold-card.is-best .row-price { color: var(--yellow); font-size: 68px; }

    /* ── Notes ── */
    .notes-area {
      position: absolute;
      top: 1640px;
      left: 112px;
      width: 1191px;
    }
    .note-item {
      font-size: 28px;
      color: var(--blue-grey);
      line-height: 1.68;
      margin-bottom: 8px;
    }
    .note-item::before { content: "★ "; }
    .note-item strong { color: var(--navy); font-weight: 700; }

    /* ── Footer: wordmark only ── */
    .footer {
      position: absolute;
      bottom: 0; left: 0;
      width: 1415px;
      height: 175px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wordmark {
      font-size: 62px;
      font-weight: 500;
      color: #fff;
      border-bottom: 10px solid var(--yellow);
      padding-bottom: 4px;
      line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="navy-zone"></div>

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-sub">欲報名請私訊官方 LINE</div>
      </div>

      <img class="mascot-float" src="./assets/ip.png" alt="">

      <div class="yellow-band">
        <span class="yellow-band-text">▌ 驗屋報價一覽 ▌</span>
      </div>

      <div class="price-section" id="priceSection"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      const data = getDataFromUrl();
      const thresholds = data.thresholds || [];
      const prices = data.prices || [];
      const lastCol = thresholds.length - 1;

      const q = (id) => document.getElementById(id);
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      const noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          const p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price section: one card per threshold
      const section = q("priceSection");
      if (section) {
        thresholds.forEach(function (threshold, colIdx) {
          const isBest = (colIdx === lastCol);
          const card = document.createElement("div");
          card.className = "threshold-card" + (isBest ? " is-best" : "");

          const header = document.createElement("div");
          header.className = "card-header";
          const labelEl = document.createElement("div");
          labelEl.className = "card-header-label";
          labelEl.textContent = threshold;
          header.appendChild(labelEl);
          if (isBest) {
            const badge = document.createElement("div");
            badge.className = "card-best-badge";
            badge.textContent = "最 優 惠";
            header.appendChild(badge);
          }
          card.appendChild(header);

          const rowsEl = document.createElement("div");
          rowsEl.className = "card-rows";
          prices.forEach(function (row) {
            const val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            const priceRow = document.createElement("div");
            priceRow.className = "card-price-row";
            priceRow.innerHTML =
              "<span class=\"row-room\">" + row.room + "</span>" +
              "<span class=\"row-price\">" + formatPrice(val) + "</span>";
            rowsEl.appendChild(priceRow);
          });
          card.appendChild(rowsEl);
          section.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
