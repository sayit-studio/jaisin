<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 團購方案</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --light: #E9ECEF;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell {
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--cream);
    }
    .poster {
      position: relative;
      width: 1415px;
      height: 2000px;
      background: var(--cream);
      overflow: hidden;
    }

    /* ── Navy top zone with diagonal bottom edge ── */
    .navy-zone {
      position: absolute;
      top: 0; left: 0;
      width: 1415px;
      height: 920px;
      background: var(--navy);
      clip-path: polygon(0 0, 100% 0, 100% 77%, 0 100%);
    }

    /* ── Top bar: logo + service (inside navy zone) ── */
    .top-bar {
      position: absolute;
      top: 64px;
      left: 112px;
      display: flex;
      align-items: center;
      gap: 44px;
    }
    #brandLogo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      flex-shrink: 0;
    }
    #logoFallback { display: none; }
    .service-line {
      font-size: 38px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      letter-spacing: 5px;
    }

    /* Right yellow accent */
    .side-accent {
      position: absolute;
      top: 0; right: 0;
      width: 12px;
      height: 710px;
      background: var(--yellow);
      z-index: 2;
    }

    /* ── Building name (large, left-aligned, inside navy zone) ── */
    .project-block {
      position: absolute;
      top: 265px;
      left: 112px;
      width: 1100px;
    }
    .project-eyebrow {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 211, 90, 0.65);
      letter-spacing: 8px;
      margin-bottom: 30px;
    }
    #projectName {
      display: block;
      font-size: 118px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 14px;
      line-height: 1.0;
      margin-bottom: 36px;
    }
    .project-sub {
      display: inline-block;
      border: 3px solid rgba(255,211,90,0.55);
      color: var(--yellow);
      font-size: 30px;
      font-weight: 500;
      padding: 10px 44px;
      border-radius: 50px;
      letter-spacing: 5px;
    }

    /* ── Mascot floating right (inside navy zone) ── */
    .mascot-float {
      position: absolute;
      top: 420px;
      right: 80px;
      width: 200px;
      object-fit: contain;
      opacity: 0.92;
    }

    /* ── Yellow band (over the diagonal cut) ── */
    .yellow-band {
      position: absolute;
      top: 840px;
      left: 0;
      width: 1415px;
      height: 96px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .yellow-band-text {
      font-size: 40px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 8px;
    }

    /* ── Price cards section (one card per threshold) ── */
    .price-section {
      position: absolute;
      top: 976px;
      left: 72px;
      width: 1271px;
      display: flex;
      gap: 36px;
      align-items: flex-start;
    }
    .threshold-card {
      flex: 1;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(13,35,64,0.08);
    }
    .threshold-card.is-best {
      background: var(--navy);
    }
    .card-header {
      padding: 24px 20px 20px;
      text-align: center;
      background: rgba(82,108,142,0.08);
      border-bottom: 3px solid var(--light);
    }
    .threshold-card.is-best .card-header {
      background: rgba(255,211,90,0.15);
      border-bottom: 3px solid rgba(255,211,90,0.3);
    }
    .card-header-label {
      font-size: 26px;
      font-weight: 700;
      color: var(--blue-grey);
      letter-spacing: 2px;
    }
    .threshold-card.is-best .card-header-label {
      color: var(--yellow);
    }
    .card-header-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--navy);
      font-size: 20px;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 20px;
      margin-top: 6px;
      letter-spacing: 1px;
    }
    .threshold-card.is-best .card-header-badge {
      background: var(--yellow);
      color: var(--navy);
    }
    .card-rows { padding: 10px 0; }
    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 22px 28px;
      border-bottom: 1px solid var(--light);
    }
    .card-price-row:last-child { border-bottom: none; }
    .threshold-card.is-best .card-price-row {
      border-bottom-color: rgba(255,211,90,0.15);
    }
    .row-room {
      font-size: 36px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 3px;
    }
    .threshold-card.is-best .row-room {
      color: rgba(255,255,255,0.85);
    }
    .row-price {
      font-size: 44px;
      font-weight: 900;
      color: var(--navy);
    }
    .threshold-card.is-best .row-price {
      color: var(--yellow);
      font-size: 50px;
    }

    /* ── Notes ── */
    .notes-area {
      position: absolute;
      top: 1640px;
      left: 112px;
      width: 960px;
    }
    .note-item {
      font-size: 28px;
      color: var(--blue-grey);
      line-height: 1.65;
      margin-bottom: 8px;
    }
    .note-item::before { content: "★ "; }
    .note-item strong { color: var(--navy); font-weight: 700; }

    /* ── QR block ── */
    .qr-block {
      position: absolute;
      top: 1620px;
      right: 112px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #qrImage { width: 200px; height: 200px; object-fit: contain; }
    #qrFallback {
      width: 200px; height: 200px;
      border: 10px solid var(--navy);
      display: grid; place-items: center;
      font-size: 44px; font-weight: 900; color: var(--navy);
    }
    .qr-label { font-size: 26px; color: var(--blue-grey); letter-spacing: 2px; }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 0; left: 0;
      width: 1415px;
      height: 195px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 112px;
    }
    .wordmark {
      font-size: 54px;
      font-weight: 500;
      color: #fff;
      line-height: 1;
      border-bottom: 10px solid var(--yellow);
      padding-bottom: 4px;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .contact { color: rgba(255,255,255,0.7); }
    .contact p { font-size: 30px; line-height: 1.45; }
    .contact strong { font-size: 40px; color: #fff; font-weight: 900; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="navy-zone"></div>
      <div class="side-accent"></div>

      <div class="top-bar">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-sub">欲報名請私訊官方 LINE</div>
      </div>

      <img class="mascot-float" src="./assets/ip.png" alt="">

      <div class="yellow-band">
        <span class="yellow-band-text">▌ 驗屋報價一覽 ▌</span>
      </div>

      <div class="price-section" id="priceSection"></div>

      <div class="notes-area" id="noteList"></div>

      <div class="qr-block">
        <img id="qrImage" alt="LINE QR">
        <div id="qrFallback" class="is-hidden">QR</div>
        <span class="qr-label">官方 LINE</span>
      </div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
        <div class="contact">
          <p>電話：<strong id="phoneText">0971-866797</strong></p>
          <p>LINE ID：<strong id="lineText">@301thssm</strong></p>
        </div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      const data = getDataFromUrl();
      const thresholds = data.thresholds || [];
      const prices = data.prices || [];
      const lastCol = thresholds.length - 1;

      const q = (id) => document.getElementById(id);
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      if (q("phoneText")) q("phoneText").textContent = data.phone || "0971-866797";
      if (q("lineText")) q("lineText").textContent = data.lineId || "@301thssm";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");
      setImage(q("qrImage"), q("qrFallback"), data.qrImage || "./assets/qrcode.png");

      // Notes
      const noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          const p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price section: one card per threshold column
      const section = q("priceSection");
      if (section) {
        thresholds.forEach(function (threshold, colIdx) {
          const isBest = (colIdx === lastCol);

          const card = document.createElement("div");
          card.className = "threshold-card" + (isBest ? " is-best" : "");

          // Card header
          const header = document.createElement("div");
          header.className = "card-header";
          const labelEl = document.createElement("div");
          labelEl.className = "card-header-label";
          labelEl.textContent = threshold;
          header.appendChild(labelEl);
          if (isBest) {
            const badge = document.createElement("div");
            badge.className = "card-header-badge";
            badge.textContent = "最 優 惠";
            header.appendChild(badge);
          }
          card.appendChild(header);

          // Price rows (one per room)
          const rowsEl = document.createElement("div");
          rowsEl.className = "card-rows";
          prices.forEach(function (row) {
            const val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            const priceRow = document.createElement("div");
            priceRow.className = "card-price-row";
            priceRow.innerHTML =
              "<span class=\"row-room\">" + row.room + "</span>" +
              "<span class=\"row-price\">" + formatPrice(val) + "</span>";
            rowsEl.appendChild(priceRow);
          });
          card.appendChild(rowsEl);
          section.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
