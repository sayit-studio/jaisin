<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 強力促銷</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster { position: relative; width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); color: #fff; }

    /* ── Header ── */
    .top-brand {
      position: absolute; top: 60px; left: 112px;
      display: flex; align-items: center; gap: 36px;
    }
    #brandLogo { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line { color: rgba(255,255,255,0.72); font-size: 36px; font-weight: 400; letter-spacing: 5px; }

    .h-divider {
      position: absolute; top: 228px; left: 112px;
      width: 1191px; height: 2px; background: rgba(255,211,90,0.22);
    }

    /* ── Building name ── */
    .project-block {
      position: absolute; top: 264px; left: 112px; width: 840px;
    }
    .project-eyebrow {
      font-size: 26px; font-weight: 400; color: rgba(255,211,90,0.65);
      letter-spacing: 10px; margin-bottom: 20px;
    }
    #projectName {
      display: block; font-size: 148px; font-weight: 900;
      color: #fff; letter-spacing: 14px; line-height: 1.0; margin-bottom: 28px;
    }
    .project-badge {
      display: inline-block; background: var(--yellow); color: var(--navy);
      font-size: 32px; font-weight: 700; padding: 12px 48px;
      border-radius: 50px; letter-spacing: 6px;
    }

    /* ── Mascot ── */
    .mascot {
      position: absolute; top: 240px; right: 44px;
      width: 360px; max-height: 540px; object-fit: contain; object-position: bottom;
    }

    /* ── Price section ── */
    .price-section {
      position: absolute; top: 800px; left: 80px; width: 1255px;
    }

    /* Thin tier bar */
    .tier-bar {
      display: flex; align-items: center; gap: 0;
      background: rgba(255,255,255,0.06); border-radius: 18px;
      padding: 22px 44px; margin-bottom: 18px;
    }
    .tier-bar-name {
      font-size: 30px; font-weight: 700; color: rgba(255,255,255,0.62);
      letter-spacing: 3px; flex-shrink: 0; min-width: 248px;
    }
    .tier-bar-prices { display: flex; flex-wrap: wrap; gap: 8px 40px; }
    .tier-bar-item { display: flex; align-items: baseline; gap: 10px; }
    .tier-bar-room { font-size: 26px; color: rgba(255,255,255,0.4); font-weight: 400; }
    .tier-bar-price { font-size: 46px; font-weight: 900; color: rgba(255,255,255,0.72); }

    /* Hero card (熱門) */
    .hero-card { border-radius: 24px; overflow: hidden; margin-bottom: 18px; }
    .hero-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 52px; background: var(--navy);
      border-bottom: 4px solid var(--yellow);
    }
    .hero-title { font-size: 52px; font-weight: 900; color: var(--yellow); letter-spacing: 6px; }
    .hero-badge {
      background: var(--yellow); color: var(--navy);
      font-size: 26px; font-weight: 900; padding: 8px 28px;
      border-radius: 50px; letter-spacing: 3px; white-space: nowrap;
    }
    .hero-prices { padding: 28px 52px; background: var(--yellow); }
    .hero-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0; border-bottom: 2px solid rgba(13,35,64,0.12);
    }
    .hero-row:last-child { border-bottom: none; }
    .hero-room { font-size: 50px; font-weight: 900; color: var(--navy); letter-spacing: 5px; }
    .hero-price { font-size: 84px; font-weight: 900; color: var(--navy); }

    /* ── Notes ── */
    .notes-area { position: absolute; left: 112px; width: 1191px; top: 1680px; }
    .note-item { font-size: 26px; color: rgba(255,255,255,0.38); line-height: 1.68; margin-bottom: 4px; }
    .note-item::before { content: "★ "; }
    .note-item strong { color: rgba(255,255,255,0.62); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      position: absolute; bottom: 0; left: 0; width: 1415px; height: 152px;
      border-top: 2px solid rgba(255,211,90,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .wordmark {
      font-size: 62px; font-weight: 500; color: #fff;
      border-bottom: 10px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>
      <div class="h-divider"></div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-badge">開 團 就 享 優 惠</div>
      </div>

      <img class="mascot" src="./assets/ip.png" alt="">

      <div class="price-section" id="priceSection"></div>
      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1; // 預約滿10戶 永遠是 index 1

      var q = function (id) { return document.getElementById(id); };
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      var noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price section
      var section = q("priceSection");
      if (section) {
        thresholds.forEach(function (threshold, colIdx) {
          var isHot = (colIdx === HOT_IDX);

          if (isHot) {
            // ── Hero card ──
            var hero = document.createElement("div");
            hero.className = "hero-card";

            var hdr = document.createElement("div");
            hdr.className = "hero-header";
            hdr.innerHTML =
              '<span class="hero-title">' + threshold + '</span>' +
              '<span class="hero-badge">★ 熱門方案</span>';
            hero.appendChild(hdr);

            var heroPs = document.createElement("div");
            heroPs.className = "hero-prices";
            prices.forEach(function (row) {
              var val = (row.values || [])[colIdx];
              if (val === null || val === undefined) return;
              var r = document.createElement("div");
              r.className = "hero-row";
              r.innerHTML =
                '<span class="hero-room">' + row.room + '</span>' +
                '<span class="hero-price">' + formatPrice(val) + '</span>';
              heroPs.appendChild(r);
            });
            hero.appendChild(heroPs);
            section.appendChild(hero);

          } else {
            // ── Thin tier bar ──
            var bar = document.createElement("div");
            bar.className = "tier-bar";

            var nameEl = document.createElement("div");
            nameEl.className = "tier-bar-name";
            nameEl.textContent = threshold;
            bar.appendChild(nameEl);

            var pricesEl = document.createElement("div");
            pricesEl.className = "tier-bar-prices";
            prices.forEach(function (row) {
              var val = (row.values || [])[colIdx];
              if (val === null || val === undefined) return;
              var item = document.createElement("div");
              item.className = "tier-bar-item";
              item.innerHTML =
                '<span class="tier-bar-room">' + row.room + '</span>' +
                '<span class="tier-bar-price">' + formatPrice(val) + '</span>';
              pricesEl.appendChild(item);
            });
            bar.appendChild(pricesEl);
            section.appendChild(bar);
          }
        });

        // 動態調整備註位置
        requestAnimationFrame(function () {
          var bottom = section.offsetTop + section.offsetHeight;
          if (noteList) noteList.style.top = Math.max(bottom + 40, 1620) + 'px';
        });
      }
    })();
  </script>
</body>
</html>
