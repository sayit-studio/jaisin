<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 強力促銷</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell {
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--navy);
    }
    .poster {
      position: relative;
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--navy);
      color: #fff;
    }

    /* ── Brand header ── */
    .top-brand {
      position: absolute;
      top: 80px;
      left: 112px;
      display: flex;
      align-items: center;
      gap: 44px;
    }
    #brandLogo {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }
    #logoFallback { display: none; }
    .service-line {
      color: rgba(255,255,255,0.85);
      font-size: 42px;
      font-weight: 500;
      letter-spacing: 5px;
    }
    .h-divider {
      position: absolute;
      top: 275px;
      left: 112px;
      width: 1191px;
      height: 2px;
      background: rgba(255,211,90,0.28);
    }

    /* ── Building name ── */
    .project-block {
      position: absolute;
      top: 308px;
      left: 112px;
      width: 1191px;
      text-align: center;
    }
    .project-eyebrow {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,211,90,0.65);
      letter-spacing: 10px;
      margin-bottom: 28px;
    }
    #projectName {
      display: block;
      font-size: 128px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 14px;
      line-height: 1.0;
      margin-bottom: 36px;
    }
    .project-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--navy);
      font-size: 34px;
      font-weight: 700;
      padding: 14px 60px;
      border-radius: 60px;
      letter-spacing: 6px;
    }

    /* ── Price cards ── */
    .price-cards {
      position: absolute;
      top: 620px;
      left: 80px;
      width: 1255px;
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }
    .price-card {
      flex: 1;
      background: #fff;
      border-radius: 24px;
      padding: 60px 52px 52px;
      color: var(--navy);
    }
    .card-room {
      font-size: 90px;
      font-weight: 900;
      color: var(--navy);
      text-align: center;
      letter-spacing: 10px;
      padding-bottom: 26px;
      border-bottom: 5px solid var(--yellow);
      margin-bottom: 38px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 0;
      border-bottom: 1px solid #E9ECEF;
    }
    .card-row-label {
      font-size: 28px;
      color: var(--blue-grey);
      font-weight: 400;
    }
    .card-row-value {
      font-size: 60px;
      font-weight: 900;
      color: var(--navy);
    }
    .card-lowest {
      margin-top: 30px;
      background: var(--navy);
      border-radius: 16px;
      padding: 28px 24px 22px;
      text-align: center;
    }
    .card-lowest-label {
      font-size: 30px;
      color: var(--yellow);
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .card-lowest-value {
      font-size: 120px;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }

    /* ── Notes ── */
    .notes-area {
      position: absolute;
      top: 1660px;
      left: 112px;
      width: 1191px;
    }
    .note-item {
      font-size: 28px;
      color: #6e8fb0;
      line-height: 1.65;
      margin-bottom: 6px;
    }
    .note-item::before { content: "★ "; }
    .note-item strong { color: #9bbde0; font-weight: 700; }

    /* ── Footer: wordmark only ── */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1415px;
      height: 160px;
      border-top: 2px solid rgba(255,211,90,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wordmark {
      font-size: 60px;
      font-weight: 500;
      color: #fff;
      border-bottom: 10px solid var(--yellow);
      padding-bottom: 4px;
      line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>
      <div class="h-divider"></div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-badge">開 團 就 享 優 惠</div>
      </div>

      <div class="price-cards" id="priceCards"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      const data = getDataFromUrl();
      const thresholds = data.thresholds || [];

      const q = (id) => document.getElementById(id);
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      const noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          const p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price cards — one card per room, lowest price biggest
      const cards = q("priceCards");
      if (cards) {
        (data.prices || []).forEach(function (row) {
          const card = document.createElement("div");
          card.className = "price-card";

          const roomEl = document.createElement("div");
          roomEl.className = "card-room";
          roomEl.textContent = row.room;
          card.appendChild(roomEl);

          const values = (row.values || []).filter(function (v) { return v !== null && v !== undefined; });
          values.forEach(function (val, i) {
            if (i === values.length - 1) {
              const lowest = document.createElement("div");
              lowest.className = "card-lowest";
              lowest.innerHTML =
                "<div class=\"card-lowest-label\">★ " + (thresholds[i] || "最低優惠") + "</div>" +
                "<div class=\"card-lowest-value\">" + formatPrice(val) + "</div>";
              card.appendChild(lowest);
            } else {
              const rowEl = document.createElement("div");
              rowEl.className = "card-row";
              rowEl.innerHTML =
                "<span class=\"card-row-label\">" + (thresholds[i] || "") + "</span>" +
                "<span class=\"card-row-value\">" + formatPrice(val) + "</span>";
              card.appendChild(rowEl);
            }
          });
          cards.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
