<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 團購方案</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --red: #d71920;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell {
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--navy);
    }
    .poster {
      position: relative;
      width: 1415px;
      height: 2000px;
      overflow: hidden;
      background: var(--navy);
      color: #fff;
    }

    /* Right accent bar */
    .side-accent {
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 760px;
      background: var(--yellow);
    }

    /* Brand header */
    .top-brand {
      position: absolute;
      top: 72px;
      left: 112px;
      display: flex;
      align-items: center;
      gap: 44px;
    }
    #brandLogo {
      width: 148px;
      height: 148px;
      object-fit: contain;
    }
    #logoFallback { display: none; }
    .service-line {
      color: rgba(255, 255, 255, 0.9);
      font-size: 40px;
      font-weight: 500;
      letter-spacing: 5px;
    }

    /* Divider */
    .h-divider {
      position: absolute;
      top: 262px;
      left: 112px;
      width: 1200px;
      height: 2px;
      background: rgba(255, 211, 90, 0.3);
    }

    /* Project name block */
    .project-block {
      position: absolute;
      top: 300px;
      left: 112px;
      width: 1200px;
      text-align: center;
    }
    .project-eyebrow {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255, 211, 90, 0.75);
      letter-spacing: 8px;
      margin-bottom: 24px;
    }
    #projectName {
      display: block;
      font-size: 100px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 10px;
      line-height: 1.05;
      margin-bottom: 36px;
    }
    .project-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--navy);
      font-size: 34px;
      font-weight: 700;
      padding: 14px 56px;
      border-radius: 60px;
      letter-spacing: 6px;
    }

    /* Tagline */
    .tagline {
      position: absolute;
      top: 670px;
      width: 1415px;
      text-align: center;
      font-size: 36px;
      font-weight: 400;
      color: rgba(255, 211, 90, 0.5);
      letter-spacing: 18px;
    }

    /* Price cards */
    .price-cards {
      position: absolute;
      top: 750px;
      left: 80px;
      width: 1255px;
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }
    .price-card {
      flex: 1;
      background: #fff;
      border-radius: 22px;
      padding: 46px 48px 40px;
      color: var(--navy);
    }
    .card-room {
      font-size: 66px;
      font-weight: 900;
      color: var(--navy);
      text-align: center;
      letter-spacing: 8px;
      padding-bottom: 22px;
      border-bottom: 5px solid var(--yellow);
      margin-bottom: 30px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid #E9ECEF;
    }
    .card-row-label {
      font-size: 26px;
      color: var(--blue-grey);
      font-weight: 400;
    }
    .card-row-value {
      font-size: 48px;
      font-weight: 900;
      color: var(--navy);
    }
    .card-lowest {
      margin-top: 26px;
      background: var(--navy);
      border-radius: 14px;
      padding: 22px 24px 18px;
      text-align: center;
    }
    .card-lowest-label {
      font-size: 26px;
      color: var(--yellow);
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .card-lowest-value {
      font-size: 82px;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }

    /* Invite strip */
    .invite-strip {
      position: absolute;
      top: 1490px;
      left: 112px;
      width: 1200px;
      text-align: center;
      border-top: 2px solid rgba(255, 211, 90, 0.25);
      border-bottom: 2px solid rgba(255, 211, 90, 0.25);
      padding: 26px 0;
      font-size: 38px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 5px;
      line-height: 1.55;
    }
    .invite-strip strong {
      color: var(--yellow);
      font-weight: 700;
    }

    /* Notes */
    .notes-area {
      position: absolute;
      top: 1680px;
      left: 112px;
      width: 700px;
    }
    .note-item {
      font-size: 27px;
      color: #7a9abf;
      line-height: 1.65;
      margin-bottom: 6px;
    }
    .note-item::before { content: "★ "; }
    .note-item strong { color: #adc8e8; font-weight: 700; }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1415px;
      height: 190px;
      border-top: 3px solid rgba(255, 211, 90, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 112px;
    }
    .wordmark {
      font-size: 54px;
      font-weight: 500;
      color: #fff;
      border-bottom: 10px solid var(--yellow);
      padding-bottom: 4px;
      line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .contact { color: rgba(255,255,255,0.65); }
    .contact p { font-size: 29px; line-height: 1.45; }
    .contact strong { font-size: 38px; color: #fff; font-weight: 900; }
    .qr-area { display: flex; align-items: center; }
    #qrImage { width: 158px; height: 158px; object-fit: contain; }
    #qrFallback {
      width: 158px; height: 158px;
      border: 8px solid var(--yellow);
      display: grid; place-items: center;
      font-size: 40px; font-weight: 900; color: var(--yellow);
    }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="side-accent"></div>

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="h-divider"></div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-badge">開 團 就 享 優 惠</div>
      </div>

      <div class="tagline">— 人 數 越 多，優 惠 越 大 —</div>

      <div class="price-cards" id="priceCards"></div>

      <div class="invite-strip">
        欲參加驗屋分享會，歡迎私訊官方 <strong>LINE</strong> 報名及詢問
      </div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
        <div class="contact">
          <p>電話：<strong id="phoneText">0971-866797</strong></p>
          <p>LINE ID：<strong id="lineText">@301thssm</strong></p>
        </div>
        <div class="qr-area">
          <img id="qrImage" alt="LINE QR">
          <div id="qrFallback" class="is-hidden">QR</div>
        </div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      const data = getDataFromUrl();
      const thresholds = data.thresholds || [];

      const q = (id) => document.getElementById(id);
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      if (q("phoneText")) q("phoneText").textContent = data.phone || "0971-866797";
      if (q("lineText")) q("lineText").textContent = data.lineId || "@301thssm";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");
      setImage(q("qrImage"), q("qrFallback"), data.qrImage || "./assets/qrcode.png");

      // Notes
      const noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          const p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price cards (one card per room)
      const cards = q("priceCards");
      if (cards) {
        (data.prices || []).forEach(function (row) {
          const card = document.createElement("div");
          card.className = "price-card";

          const roomEl = document.createElement("div");
          roomEl.className = "card-room";
          roomEl.textContent = row.room;
          card.appendChild(roomEl);

          const values = row.values || [];
          const lastIdx = values.filter(function (v) { return v !== null && v !== undefined; }).length - 1;
          let shown = 0;

          values.forEach(function (val, i) {
            if (val === null || val === undefined) return;
            if (shown === lastIdx) {
              const lowest = document.createElement("div");
              lowest.className = "card-lowest";
              lowest.innerHTML =
                "<div class=\"card-lowest-label\">★ " + (thresholds[i] || "最低優惠") + "</div>" +
                "<div class=\"card-lowest-value\">" + formatPrice(val) + "</div>";
              card.appendChild(lowest);
            } else {
              const rowEl = document.createElement("div");
              rowEl.className = "card-row";
              rowEl.innerHTML =
                "<span class=\"card-row-label\">" + (thresholds[i] || "") + "</span>" +
                "<span class=\"card-row-value\">" + formatPrice(val) + "</span>";
              card.appendChild(rowEl);
            }
            shown++;
          });
          cards.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
