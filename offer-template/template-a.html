<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 強力促銷</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster {
      width: 1415px; height: 2000px; overflow: hidden;
      background: var(--navy);
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .top-header {
      display: flex; align-items: center; gap: 36px;
      padding: 44px 112px 40px;
      border-bottom: 2px solid rgba(255,211,90,0.18);
      flex-shrink: 0;
    }
    #brandLogo { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line {
      font-size: 44px; font-weight: 500;
      color: rgba(255,255,255,0.65); letter-spacing: 5px;
    }

    /* ── Building name zone ── */
    .name-zone {
      position: relative; min-height: 360px;
      padding: 44px 112px 40px;
      border-bottom: 2px solid rgba(255,211,90,0.12);
      flex-shrink: 0;
    }
    .project-eyebrow {
      font-size: 34px; font-weight: 600;
      color: rgba(255,211,90,0.65); letter-spacing: 10px; margin-bottom: 18px;
    }
    #projectName {
      display: block; font-size: 168px; font-weight: 900;
      color: #fff; letter-spacing: 14px; line-height: 1.0; margin-bottom: 22px;
    }
    .project-sub {
      font-size: 28px; font-weight: 500;
      color: rgba(255,255,255,0.45); letter-spacing: 5px;
    }
    .mascot {
      position: absolute; right: 52px; top: 20px; bottom: 0;
      width: 380px;
      object-fit: contain; object-position: bottom;
    }

    /* ── Price header bar ── */
    .price-header-bar {
      background: rgba(255,211,90,0.08);
      padding: 18px 112px;
      font-size: 48px; font-weight: 900;
      color: var(--yellow); letter-spacing: 10px;
      flex-shrink: 0;
    }

    /* ── Price bands ── */
    .price-bands {
      padding: 44px 80px;
      display: flex; flex-direction: column; gap: 36px;
      flex-shrink: 0;
    }
    .price-band {
      background: rgba(255,255,255,0.07);
      border-radius: 20px; padding: 40px 60px;
      position: relative;
    }
    .band-label {
      font-size: 44px; font-weight: 700;
      color: rgba(255,255,255,0.7); letter-spacing: 4px; margin-bottom: 22px;
    }
    .band-prices { display: flex; }
    .price-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .price-item + .price-item {
      border-left: 2px solid rgba(255,255,255,0.08);
    }
    .room-name {
      font-size: 36px; font-weight: 600;
      color: rgba(255,255,255,0.5); letter-spacing: 3px;
    }
    .price-val {
      font-size: 96px; font-weight: 900;
      color: #fff; line-height: 1;
    }

    /* 10戶：黃底突出卡片 */
    .price-band.is-hot {
      background: var(--yellow);
      box-shadow: 0 8px 48px rgba(255,211,90,0.28);
    }
    .price-band.is-hot .band-label { color: var(--navy); margin-top: 44px; }
    .price-band.is-hot .room-name { color: rgba(13,35,64,0.6); }
    .price-band.is-hot .price-val { color: var(--navy); }
    .price-band.is-hot .price-item + .price-item { border-left-color: rgba(13,35,64,0.1); }
    .hot-badge {
      position: absolute; top: 0; left: 0;
      background: var(--navy); color: var(--yellow);
      font-size: 34px; font-weight: 900; letter-spacing: 4px;
      padding: 12px 40px; border-radius: 20px 0 20px 0;
    }

    /* ── Notes ── */
    .notes-area {
      flex: 1; padding: 32px 60px;
      display: flex; flex-direction: column; gap: 18px;
      justify-content: center;
    }
    .note-item {
      font-size: 34px; font-weight: 500;
      color: rgba(255,255,255,0.52); line-height: 1.75;
      padding-left: 22px; border-left: 4px solid var(--yellow);
    }
    .note-item strong { color: rgba(255,255,255,0.8); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0; height: 160px;
      border-top: 2px solid rgba(255,211,90,0.18);
      display: flex; align-items: center;
      padding: 0 112px; justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; gap: 22px; }
    .footer-logo { width: 72px; height: 72px; object-fit: contain; }
    .wordmark {
      font-size: 56px; font-weight: 500; color: #fff;
      border-bottom: 8px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .footer-tagline {
      font-size: 28px; font-weight: 600;
      color: rgba(255,255,255,0.28); letter-spacing: 6px;
    }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-header">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="name-zone">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <img class="mascot" src="./assets/ip.png" alt="">
      </div>

      <div class="price-header-bar">▌ 驗屋報價一覽 ▌</div>

      <div class="price-bands" id="priceBands"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="footer-brand">
          <img class="footer-logo" src="./assets/logo.png" alt="">
          <div class="wordmark">宅心<strong>驗屋</strong></div>
        </div>
        <div class="footer-tagline">— 人 數 越 多 · 價 惠 越 大 —</div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1;

      var q = function (id) { return document.getElementById(id); };
      if (q('projectName')) q('projectName').textContent = data.projectName || '建案專屬';
      setImage(q('brandLogo'), q('logoFallback'), data.brandLogo || './assets/logo.png');

      // Notes
      var noteList = q('noteList');
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement('p');
          p.className = 'note-item';
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price bands
      var bandsEl = q('priceBands');
      if (bandsEl) {
        thresholds.forEach(function (threshold, colIdx) {
          var isHot = (colIdx === HOT_IDX);
          var band = document.createElement('div');
          band.className = 'price-band' + (isHot ? ' is-hot' : '');

          if (isHot) {
            var badge = document.createElement('div');
            badge.className = 'hot-badge';
            badge.textContent = '★ 熱門方案';
            band.appendChild(badge);
          }

          var label = document.createElement('div');
          label.className = 'band-label';
          label.textContent = threshold;
          band.appendChild(label);

          var pricesEl = document.createElement('div');
          pricesEl.className = 'band-prices';
          prices.forEach(function (row) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var item = document.createElement('div');
            item.className = 'price-item';
            item.innerHTML =
              '<span class="room-name">' + row.room + '</span>' +
              '<span class="price-val">' + formatPrice(val) + '</span>';
            pricesEl.appendChild(item);
          });
          band.appendChild(pricesEl);
          bandsEl.appendChild(band);
        });
      }
    })();
  </script>
</body>
</html>
