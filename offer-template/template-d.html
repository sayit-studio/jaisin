<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 分房卡片版</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster {
      width: 1415px; height: 2000px; overflow: hidden;
      background: var(--navy);
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .top-header {
      display: flex; align-items: center; gap: 36px;
      padding: 44px 112px 40px;
      border-bottom: 2px solid rgba(255,211,90,0.18);
      flex-shrink: 0;
    }
    #brandLogo { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line {
      font-size: 44px; font-weight: 500;
      color: rgba(255,255,255,0.65); letter-spacing: 5px;
    }

    /* ── Building name zone ── */
    .name-zone {
      position: relative;
      padding: 44px 112px 40px;
      border-bottom: 2px solid rgba(255,211,90,0.12);
      flex-shrink: 0;
    }
    .project-eyebrow {
      font-size: 34px; font-weight: 600;
      color: rgba(255,211,90,0.65); letter-spacing: 10px; margin-bottom: 18px;
    }
    #projectName {
      display: block; font-size: 168px; font-weight: 900;
      color: #fff; letter-spacing: 14px; line-height: 1.0;
    }
    .mascot {
      position: absolute; right: 52px; top: 20px; bottom: 0;
      width: 380px;
      object-fit: contain; object-position: bottom;
    }

    /* ── Yellow sep ── */
    .yellow-sep { height: 8px; background: var(--yellow); flex-shrink: 0; }

    /* ── Price header bar ── */
    .price-header-bar {
      text-align: center; padding: 22px 112px;
      font-size: 48px; font-weight: 900;
      color: var(--yellow); letter-spacing: 10px;
      flex-shrink: 0;
    }

    /* ── Price cards ── */
    .price-cards {
      padding: 36px 80px 0;
      display: flex; flex-wrap: wrap;
      gap: 36px 40px; align-items: flex-start;
      flex-shrink: 0;
    }
    .price-cards.count-3 { gap: 28px; }

    .price-card {
      flex: 1; min-width: 560px;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 6px 36px rgba(0,0,0,0.3);
    }
    .count-3 .price-card { min-width: 360px; }

    /* Room header */
    .card-room {
      background: var(--navy);
      border-bottom: 6px solid var(--yellow);
      padding: 22px 36px; text-align: center;
      font-size: 96px; font-weight: 900;
      color: #fff; letter-spacing: 10px; line-height: 1;
    }
    .count-3 .card-room { font-size: 78px; padding: 18px 28px; }

    /* Layer 1: 開團優惠 */
    .card-tier-basic {
      display: flex; justify-content: space-between; align-items: baseline;
      background: #F4F6F8; padding: 22px 36px;
      border-bottom: 1px solid #E9ECEF;
    }
    .count-3 .card-tier-basic { padding: 18px 28px; }
    .card-tier-basic .t-name {
      font-size: 30px; font-weight: 500;
      color: #9ca3af; letter-spacing: 2px;
    }
    .card-tier-basic .t-price { font-size: 60px; font-weight: 900; color: #b0b8c4; }
    .count-3 .card-tier-basic .t-price { font-size: 50px; }

    /* Layer 2: 預約滿10戶 */
    .card-tier-mid {
      position: relative;
      display: flex; justify-content: space-between; align-items: baseline;
      background: #fff; padding: 22px 36px;
      border-bottom: 1px solid #E9ECEF;
    }
    .count-3 .card-tier-mid { padding: 18px 28px; }
    .hot-corner {
      position: absolute; top: 0; right: 0;
      background: var(--navy); color: var(--yellow);
      font-size: 28px; font-weight: 900;
      padding: 7px 22px; border-radius: 0 0 0 16px; letter-spacing: 2px;
    }
    .count-3 .hot-corner { font-size: 22px; padding: 5px 16px; }
    .card-tier-mid .t-name {
      font-size: 32px; font-weight: 700;
      color: var(--navy); letter-spacing: 2px;
    }
    .card-tier-mid .t-price { font-size: 72px; font-weight: 900; color: var(--navy); }
    .count-3 .card-tier-mid .t-price { font-size: 58px; }

    /* Layer 3: 最低價黃底 */
    .card-lowest {
      background: var(--yellow); padding: 26px 36px 30px; text-align: center;
    }
    .count-3 .card-lowest { padding: 20px 28px 24px; }
    .lowest-label {
      font-size: 30px; font-weight: 700; color: var(--navy);
      letter-spacing: 3px; margin-bottom: 8px;
    }
    .count-3 .lowest-label { font-size: 24px; }
    .lowest-price { font-size: 110px; font-weight: 900; color: var(--navy); line-height: 1; }
    .count-3 .lowest-price { font-size: 88px; }

    /* ── Notes ── */
    .notes-area {
      flex: 1; padding: 36px 112px;
      display: flex; flex-direction: column; gap: 20px;
      justify-content: center;
    }
    .note-item {
      font-size: 34px; font-weight: 500;
      color: rgba(255,255,255,0.52); line-height: 1.75;
      padding-left: 22px; border-left: 4px solid var(--yellow);
    }
    .note-item strong { color: rgba(255,255,255,0.8); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0; height: 160px;
      border-top: 2px solid rgba(255,211,90,0.18);
      display: flex; align-items: center;
      padding: 0 112px; justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; gap: 22px; }
    .footer-logo { width: 72px; height: 72px; object-fit: contain; }
    .wordmark {
      font-size: 56px; font-weight: 500; color: #fff;
      border-bottom: 8px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .footer-tagline {
      font-size: 32px; font-weight: 600;
      color: rgba(255,255,255,0.28); letter-spacing: 6px;
    }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-header">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>

      <div class="name-zone">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <img class="mascot" src="./assets/ip.png" alt="">
      </div>

      <div class="yellow-sep"></div>
      <div class="price-header-bar">▌ 驗屋報價一覽 ▌</div>

      <div class="price-cards" id="priceCards"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="footer-brand">
          <img class="footer-logo" src="./assets/logo.png" alt="">
          <div class="wordmark">宅心<strong>驗屋</strong></div>
        </div>
        <div class="footer-tagline">— 人 數 越 多 · 價 惠 越 大 —</div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];

      var BASIC_IDX  = 0;
      var HOT_IDX    = 1;
      var LOWEST_IDX = thresholds.length - 1;

      var q = function (id) { return document.getElementById(id); };
      if (q('projectName')) q('projectName').textContent = data.projectName || '建案專屬';
      setImage(q('brandLogo'), q('logoFallback'), data.brandLogo || './assets/logo.png');

      // Notes
      var noteList = q('noteList');
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement('p');
          p.className = 'note-item';
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price cards：一張卡片一個房型
      var cardsEl = q('priceCards');
      if (cardsEl) {
        if (prices.length === 3) cardsEl.classList.add('count-3');

        prices.forEach(function (row) {
          var card = document.createElement('div');
          card.className = 'price-card';

          var roomEl = document.createElement('div');
          roomEl.className = 'card-room';
          roomEl.textContent = row.room;
          card.appendChild(roomEl);

          thresholds.forEach(function (threshold, colIdx) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;

            if (colIdx === LOWEST_IDX) {
              var el = document.createElement('div');
              el.className = 'card-lowest';
              el.innerHTML =
                '<div class="lowest-label">' + threshold + '</div>' +
                '<div class="lowest-price">' + formatPrice(val) + '</div>';
              card.appendChild(el);
            } else if (colIdx === HOT_IDX) {
              var el = document.createElement('div');
              el.className = 'card-tier-mid';
              el.innerHTML =
                '<div class="hot-corner">★ 熱門方案</div>' +
                '<span class="t-name">' + threshold + '</span>' +
                '<span class="t-price">' + formatPrice(val) + '</span>';
              card.appendChild(el);
            } else {
              var el = document.createElement('div');
              el.className = 'card-tier-basic';
              el.innerHTML =
                '<span class="t-name">' + threshold + '</span>' +
                '<span class="t-price">' + formatPrice(val) + '</span>';
              card.appendChild(el);
            }
          });

          cardsEl.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
