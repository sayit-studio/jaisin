<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 房型精選</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster { position: relative; width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }

    /* ── Header ── */
    .top-brand {
      position: absolute; top: 60px; left: 112px;
      display: flex; align-items: center; gap: 36px;
    }
    #brandLogo { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line { color: rgba(255,255,255,0.72); font-size: 36px; font-weight: 400; letter-spacing: 5px; }

    .h-divider {
      position: absolute; top: 228px; left: 112px;
      width: 1191px; height: 2px; background: rgba(255,211,90,0.22);
    }

    /* ── Building name ── */
    .project-block {
      position: absolute; top: 258px; left: 112px; width: 820px;
    }
    .project-eyebrow {
      font-size: 26px; font-weight: 400; color: rgba(255,211,90,0.65);
      letter-spacing: 10px; margin-bottom: 20px;
    }
    #projectName {
      display: block; font-size: 148px; font-weight: 900;
      color: #fff; letter-spacing: 14px; line-height: 1.0; margin-bottom: 28px;
    }
    .project-sub {
      font-size: 30px; font-weight: 400; color: rgba(255,255,255,0.55); letter-spacing: 4px;
    }

    /* ── Mascot ── */
    .mascot {
      position: absolute; top: 215px; right: 40px;
      width: 380px; max-height: 540px;
      object-fit: contain; object-position: bottom;
    }

    /* ── Tagline ── */
    .tagline {
      position: absolute; top: 558px;
      left: 0; width: 1415px;
      text-align: center;
      font-size: 34px; font-weight: 500; color: rgba(255,255,255,0.55);
      letter-spacing: 8px;
    }

    /* ── Yellow separator ── */
    .yellow-sep {
      position: absolute; top: 614px; left: 0;
      width: 1415px; height: 8px; background: var(--yellow);
    }

    /* ── Price section header ── */
    .price-header {
      position: absolute; top: 630px;
      left: 0; width: 1415px;
      text-align: center;
      font-size: 40px; font-weight: 900; color: var(--yellow);
      letter-spacing: 10px; line-height: 1;
      padding-top: 16px;
    }

    /* ── Price cards ── */
    .price-cards {
      position: absolute; top: 708px; left: 80px; width: 1255px;
      display: flex; flex-wrap: wrap;
      gap: 36px 40px;
      align-items: flex-start;
    }
    .price-card {
      flex: 1; min-width: 560px;
      background: #fff; border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 28px rgba(0,0,0,0.18);
    }
    /* 3 rooms: reduce min-width so they fit in one row */
    .count-3 .price-card { min-width: 360px; }

    /* Room header */
    .card-room-header {
      background: #fff;
      border-bottom: 6px solid var(--yellow);
      padding: 24px 36px;
      text-align: center;
      font-size: 80px; font-weight: 900; color: var(--navy);
      letter-spacing: 10px; line-height: 1;
    }
    .count-3 .card-room-header { font-size: 64px; padding: 20px 28px; }

    /* Normal tier row */
    .card-tier-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 22px 36px;
      border-bottom: 1px solid #E9ECEF;
    }
    .count-3 .card-tier-row { padding: 18px 24px; }
    .card-tier-row:last-child { border-bottom: none; }
    .tier-name {
      font-size: 26px; font-weight: 500; color: var(--blue-grey); letter-spacing: 2px;
    }
    .tier-price {
      font-size: 56px; font-weight: 900; color: var(--navy);
    }
    .count-3 .tier-name { font-size: 22px; }
    .count-3 .tier-price { font-size: 46px; }

    /* Hot tier (預約滿10戶) */
    .card-tier-hot {
      background: var(--navy);
      padding: 20px 36px 24px;
      text-align: center;
    }
    .count-3 .card-tier-hot { padding: 16px 24px 20px; }
    .hot-label {
      font-size: 26px; font-weight: 900; color: var(--yellow);
      letter-spacing: 4px; margin-bottom: 6px;
    }
    .hot-badge-text {
      display: inline-block; background: var(--yellow); color: var(--navy);
      font-size: 20px; font-weight: 900; padding: 3px 14px;
      border-radius: 20px; letter-spacing: 2px; margin-left: 8px;
    }
    .hot-price {
      font-size: 88px; font-weight: 900; color: var(--yellow); line-height: 1;
    }
    .count-3 .hot-label { font-size: 22px; }
    .count-3 .hot-price { font-size: 70px; }

    /* ── Notes ── */
    .notes-area { position: absolute; left: 112px; width: 1191px; top: 1720px; }
    .note-item { font-size: 26px; color: rgba(255,255,255,0.38); line-height: 1.65; margin-bottom: 4px; }
    .note-item::before { content: "★ "; }
    .note-item strong { color: rgba(255,255,255,0.62); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      position: absolute; bottom: 0; left: 0; width: 1415px; height: 152px;
      border-top: 2px solid rgba(255,211,90,0.22);
      display: flex; align-items: center; justify-content: center;
    }
    .wordmark {
      font-size: 62px; font-weight: 500; color: #fff;
      border-bottom: 10px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-brand">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">驗屋｜裝修｜裝潢細清</span>
      </div>
      <div class="h-divider"></div>

      <div class="project-block">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <div class="project-sub">欲報名請私訊官方 LINE</div>
      </div>

      <img class="mascot" src="./assets/ip.png" alt="">

      <div class="tagline">— 人 數 越 多 · 價 惠 越 大 —</div>
      <div class="yellow-sep"></div>
      <div class="price-header">▌ 驗屋報價一覽 ▌</div>

      <div class="price-cards" id="priceCards"></div>
      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1; // 預約滿10戶 永遠是 index 1

      var q = function (id) { return document.getElementById(id); };
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      var noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price cards: one card per ROOM TYPE
      var cardsEl = q("priceCards");
      if (cardsEl) {
        // 3 rooms: add count class for smaller fonts
        if (prices.length === 3) cardsEl.classList.add("count-3");

        prices.forEach(function (row) {
          var card = document.createElement("div");
          card.className = "price-card";

          // Room header
          var roomHeader = document.createElement("div");
          roomHeader.className = "card-room-header";
          roomHeader.textContent = row.room;
          card.appendChild(roomHeader);

          // Tier rows
          thresholds.forEach(function (threshold, colIdx) {
            var isHot = (colIdx === HOT_IDX);
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;

            if (isHot) {
              var hotEl = document.createElement("div");
              hotEl.className = "card-tier-hot";
              hotEl.innerHTML =
                '<div class="hot-label">' + threshold +
                '<span class="hot-badge-text">★ 熱門</span></div>' +
                '<div class="hot-price">' + formatPrice(val) + '</div>';
              card.appendChild(hotEl);
            } else {
              var tierEl = document.createElement("div");
              tierEl.className = "card-tier-row";
              tierEl.innerHTML =
                '<span class="tier-name">' + threshold + '</span>' +
                '<span class="tier-price">' + formatPrice(val) + '</span>';
              card.appendChild(tierEl);
            }
          });

          cardsEl.appendChild(card);
        });

        // 動態調整備註位置
        requestAnimationFrame(function () {
          var bottom = cardsEl.offsetTop + cardsEl.offsetHeight;
          if (noteList) noteList.style.top = Math.max(bottom + 44, 1680) + 'px';
        });
      }
    })();
  </script>
</body>
</html>
