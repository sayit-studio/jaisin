<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 分房卡片版</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--navy); }
    .poster {
      width: 1415px; height: 2000px; overflow: hidden;
      background: var(--navy);
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .top-header {
      display: flex; align-items: center; gap: 36px;
      padding: 30px 112px 28px;
      border-bottom: 2px solid rgba(255,211,90,0.18);
      flex-shrink: 0;
    }
    #brandLogo { width: 128px; height: 128px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .service-line {
      font-size: 52px; font-weight: 700;
      color: rgba(255,255,255,0.65); letter-spacing: 5px;
    }

    /* ── Building name zone ── */
    .name-zone {
      position: relative;
      padding: 34px 112px 28px;
      border-bottom: 2px solid rgba(255,211,90,0.12);
      flex-shrink: 0;
      min-height: 250px;
    }
    .project-eyebrow {
      font-size: 46px; font-weight: 800;
      color: rgba(255,211,90,0.65); letter-spacing: 10px; margin-bottom: 18px;
    }
    #projectName {
      display: block; font-size: 170px; font-weight: 900;
      color: #fff; letter-spacing: 12px; line-height: 1.0;
      padding-right: 0; white-space: nowrap; overflow: hidden;
    }
    .mascot {
      display: none;
      position: absolute; right: 96px; top: 28px; bottom: 0;
      width: 270px;
      object-fit: contain; object-position: bottom;
    }

    /* ── Yellow sep ── */
    .yellow-sep { height: 8px; background: var(--yellow); flex-shrink: 0; }

    /* ── Price header bar ── */
    .price-header-bar {
      text-align: center; padding: 18px 112px 10px;
      font-size: 58px; font-weight: 900;
      color: var(--yellow); letter-spacing: 10px;
      flex-shrink: 0;
    }
    .tax-note {
      text-align: center;
      font-size: 44px; font-weight: 900;
      color: rgba(255,255,255,0.62); letter-spacing: 4px;
      padding: 0 0 12px;
      flex-shrink: 0;
    }

    /* ── Price cards ── */
    .price-cards {
      padding: 28px 80px 0;
      display: grid;
      gap: 32px;
      align-items: stretch;
      flex-shrink: 0;
    }
    .price-cards.count-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .price-cards.count-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 28px; }
    .price-cards.count-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 26px 32px; padding-top: 22px; }

    .price-card {
      min-width: 0;
      border-radius: 20px; overflow: hidden;
      border: 3px solid rgba(255,211,90,0.28);
      box-shadow: 0 12px 44px rgba(0,0,0,0.42);
      background: #fff;
    }

    /* Room header */
    .card-room {
      background: var(--navy);
      border-bottom: 6px solid var(--yellow);
      padding: 26px 36px; text-align: center;
      font-size: 118px; font-weight: 900;
      color: #fff; letter-spacing: 10px; line-height: 1;
    }
    .count-3 .card-room { font-size: 96px; padding: 22px 28px; }
    .count-4 .card-room { font-size: 76px; padding: 18px 28px; }

    /* Unified tier rows */
    .card-tier {
      display: grid; grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px; align-items: center;
      background: #fff; padding: 42px 36px;
      border-bottom: 1px solid #E9ECEF;
    }
    .card-tier:last-child { border-bottom: none; }
    .card-tier .t-name {
      font-size: 40px; font-weight: 800;
      color: var(--navy); letter-spacing: 1px;
      white-space: nowrap;
    }
    .card-tier .t-price {
      font-size: 82px; font-weight: 900; color: var(--navy);
      white-space: nowrap; line-height: 1;
    }

    /* 熱門方案：全寬黃色橫條 + 內容行 */
    .card-tier.is-hot {
      display: grid; grid-template-columns: minmax(0, 1fr);
      gap: 16px; align-items: stretch;
      padding: 26px 36px;
      background: #FFF5D2;
      border-top: 3px solid rgba(255,211,90,0.9);
      border-bottom: 3px solid rgba(255,211,90,0.9);
      box-shadow: inset 8px 0 0 var(--yellow);
    }
    .hot-banner {
      width: auto; padding: 10px 18px;
      background: var(--navy);
      border-radius: 999px;
      font-size: 36px; font-weight: 900; color: var(--yellow); letter-spacing: 2px;
      justify-self: start;
      white-space: nowrap;
    }
    .tier-content {
      width: 100%; padding: 0;
      display: grid; grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px; align-items: center;
      background: transparent;
    }
    .card-tier.is-hot .t-name,
    .card-tier.is-hot .t-price {
      color: var(--navy);
    }
    .card-tier .t-price,
    .tier-content .t-price {
      justify-self: end;
    }

    /* count-2 adjustments */
    .count-2 .card-tier { padding: 44px 40px; grid-template-columns: 220px auto; }
    .count-2 .card-tier .t-name { font-size: 40px; }
    .count-2 .card-tier .t-price { font-size: 82px; }
    .count-2 .card-tier.is-hot { grid-template-columns: minmax(0, 1fr); padding: 42px 40px; }
    .count-2 .hot-banner { font-size: 36px; padding: 12px 22px; }
    .count-2 .tier-content { grid-template-columns: 220px auto; }

    /* count-3 adjustments */
    .count-3 .card-tier { padding: 24px 22px; gap: 12px; }
    .count-3 .card-tier .t-name { font-size: 30px; letter-spacing: 0; }
    .count-3 .card-tier .t-price { font-size: 60px; }
    .count-3 .card-tier.is-hot { grid-template-columns: minmax(0, 1fr); padding: 20px 22px; }
    .count-3 .hot-banner { padding: 9px 16px; font-size: 30px; }
    .count-3 .tier-content { gap: 12px; }

    /* count-4 adjustments */
    .count-4 .card-room { font-size: 68px; padding: 14px 28px; }
    .count-4 .card-tier { padding: 14px 28px; grid-template-columns: 180px auto; }
    .count-4 .card-tier .t-name { font-size: 30px; }
    .count-4 .card-tier .t-price { font-size: 58px; }
    .count-4 .card-tier.is-hot { grid-template-columns: minmax(0, 1fr); padding: 14px 28px; }
    .count-4 .hot-banner { padding: 8px 14px; font-size: 26px; letter-spacing: 1px; }
    .count-4 .tier-content { grid-template-columns: 160px auto; }
    .count-4 + .notes-area .note-item { font-size: 34px; line-height: 1.32; }

    /* ── Notes ── */
    .notes-area {
      flex: 1; padding: 48px 60px 32px;
      display: flex; flex-direction: column; gap: 14px;
      justify-content: flex-start;
    }
    .note-item {
      font-size: 44px; font-weight: 800;
      color: rgba(255,255,255,0.68); line-height: 1.45;
      padding-left: 24px; border-left: 5px solid var(--yellow);
    }
    .note-item strong { color: rgba(255,255,255,0.8); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      display: none;
      flex-shrink: 0; height: 160px;
      border-top: 2px solid rgba(255,211,90,0.18);
      display: flex; align-items: center;
      padding: 0 112px; justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; gap: 22px; }
    .footer-logo { width: 72px; height: 72px; object-fit: contain; }
    .wordmark {
      font-size: 56px; font-weight: 500; color: #fff;
      border-bottom: 8px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .footer-tagline {
      font-size: 32px; font-weight: 600;
      color: rgba(255,255,255,0.28); letter-spacing: 6px;
    }
    .is-hidden { display: none !important; }
    footer.footer { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="top-header">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <span class="service-line">宅心驗屋 傾聽你心</span>
      </div>

      <div class="name-zone">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
        <img class="mascot" src="./assets/ip.png" alt="">
      </div>

      <div class="yellow-sep"></div>
      <div class="price-header-bar">▌ 驗屋報價一覽 ▌</div>
      <div class="tax-note">以下皆為未稅價</div>

      <div class="price-cards" id="priceCards"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="footer-brand">
          <img class="footer-logo" src="./assets/logo.png" alt="">
          <div class="wordmark">宅心<strong>驗屋</strong></div>
        </div>
        <div class="footer-tagline">— 人 數 越 多 · 價 惠 越 大 —</div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];

      var HOT_IDX = 1;

      var q = function (id) { return document.getElementById(id); };
      var nameEl = q('projectName');
      if (nameEl) {
        var name = data.projectName || '建案專屬';
        nameEl.textContent = name;
        var n = name.length;
        var availableW = 1415 - 112 * 2;
        var fs = Math.floor((availableW * 0.96 - Math.max(0, n - 1) * 12) / Math.max(1, n));
        nameEl.style.fontSize = Math.min(170, Math.max(82, fs)) + 'px';
      }
      setImage(q('brandLogo'), q('logoFallback'), data.brandLogo || './assets/logo.png');

      // Notes
      var noteList = q('noteList');
      if (noteList) {
        (data.notes || []).slice(0, 3).forEach(function (note) {
          var p = document.createElement('p');
          p.className = 'note-item';
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Price cards：一張卡片一個房型
      var cardsEl = q('priceCards');
      if (cardsEl) {
        var countClass = 'count-' + Math.min(4, Math.max(2, prices.length || 2));
        cardsEl.classList.add(countClass);

        prices.forEach(function (row) {
          var card = document.createElement('div');
          card.className = 'price-card';

          var roomEl = document.createElement('div');
          roomEl.className = 'card-room';
          roomEl.textContent = row.room;
          card.appendChild(roomEl);

          thresholds.forEach(function (threshold, colIdx) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var isHot = (colIdx === HOT_IDX);
            var tierEl = document.createElement('div');
            tierEl.className = 'card-tier' + (isHot ? ' is-hot' : '');
            if (isHot) {
              var banner = document.createElement('div');
              banner.className = 'hot-banner';
              banner.textContent = '★ 熱門方案';
              tierEl.appendChild(banner);
              var content = document.createElement('div');
              content.className = 'tier-content';
              content.innerHTML =
                '<span class="t-name">' + threshold + '</span>' +
                '<span class="t-price">' + formatPrice(val) + '</span>';
              tierEl.appendChild(content);
            } else {
              tierEl.innerHTML =
                '<span class="t-name">' + threshold + '</span>' +
                '<span class="t-price">' + formatPrice(val) + '</span>';
            }
            card.appendChild(tierEl);
          });

          cardsEl.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
