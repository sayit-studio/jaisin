<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>宅心驗屋團購方案報價單</title>
    <link rel="stylesheet" href="./styles.css?v=20260501-fixed-canvas">
  </head>
  <body>
    <main class="page-shell">
      <section class="poster" id="poster" aria-label="宅心驗屋團購方案報價單">
        <div class="top-brand">
          <div class="logo-lockup">
            <img id="brandLogo" alt="宅心驗屋">
            <div class="logo-fallback" id="logoFallback" aria-hidden="true">
              <span></span>
              <strong>宅心</strong>
            </div>
          </div>
          <div class="service-line">驗屋｜裝修｜裝潢細清</div>
        </div>

        <div class="project-area">
          <h1 id="projectName">建案專屬</h1>
          <img id="projectImage" alt="建案圖片">
        </div>

        <p class="invite-copy">
          欲參加公開或專屬社區驗屋分享會<br>
          歡迎私訊官方<span>LINE</span>報名及詢問
        </p>

        <section class="price-section" aria-label="驗屋價格">
          <div class="price-title">
            <div class="home-icon" aria-hidden="true">
              <span class="roof"></span>
              <span class="body"></span>
              <span class="chimney"></span>
            </div>
            <h2>驗屋價格</h2>
          </div>

          <div class="price-table" id="priceTable"></div>
          <div class="dash-line" aria-hidden="true"></div>
        </section>

        <section class="notes">
          <div class="note-list" id="noteList"></div>
          <div class="qr-block">
            <img id="qrImage" alt="宅心驗屋 LINE QR Code">
            <div class="qr-placeholder" id="qrFallback">QR</div>
          </div>
        </section>

        <footer class="footer-brand">
          <div class="wordmark">
            <span>宅心</span><strong>驗屋</strong>
          </div>
          <div class="contact">
            <p>電話:<strong id="phoneText">0971-866797</strong></p>
            <p>LINE ID:<strong id="lineText">@301thssm</strong></p>
          </div>
        </footer>

        <div class="side-rule" aria-hidden="true"></div>
        <div class="side-text" aria-hidden="true">Home Inspection</div>
      </section>
    </main>

    <script src="./template.js"></script>
  </body>
</html>
