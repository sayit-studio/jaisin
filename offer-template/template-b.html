<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 一般促銷</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --light: #E9ECEF;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--cream); }
    .poster { position: relative; width: 1415px; height: 2000px; background: var(--cream); overflow: hidden; }

    /* ── Navy header ── */
    .header-band {
      position: absolute; top: 0; left: 0; width: 1415px; height: 260px;
      background: var(--navy);
      display: flex; align-items: center; padding: 0 112px; gap: 40px;
    }
    .header-accent { position: absolute; top: 0; right: 0; width: 12px; height: 260px; background: var(--yellow); }
    #brandLogo { width: 136px; height: 136px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .header-text { display: flex; flex-direction: column; gap: 6px; }
    .header-brand { font-size: 52px; font-weight: 700; color: #fff; letter-spacing: 4px; }
    .header-service { font-size: 32px; font-weight: 400; color: rgba(255,255,255,0.68); letter-spacing: 5px; }

    /* ── Building name ── */
    .project-section {
      position: absolute; top: 296px; left: 0; width: 1415px;
      text-align: center; padding: 0 112px;
    }
    .project-eyebrow {
      font-size: 28px; font-weight: 400; color: var(--blue-grey);
      letter-spacing: 10px; margin-bottom: 18px;
    }
    #projectName {
      display: block; font-size: 148px; font-weight: 900;
      color: var(--navy); letter-spacing: 16px; line-height: 1.0;
    }

    /* ── Separator ── */
    .sep {
      position: absolute; left: 112px; width: 1191px;
      height: 7px; background: var(--yellow); border-radius: 4px;
    }
    .sep-1 { top: 640px; }

    /* ── Section header (mascot + title) ── */
    .section-header {
      position: absolute; top: 672px; left: 112px;
      display: flex; align-items: center; gap: 28px;
    }
    .mascot-icon { width: 92px; height: 112px; object-fit: contain; }
    .section-header h2 { font-size: 52px; font-weight: 700; color: var(--navy); letter-spacing: 3px; }

    /* ── Price table ── */
    .price-table-wrap {
      position: absolute; top: 820px; left: 112px; width: 1191px;
    }
    .price-table { width: 100%; border-collapse: separate; border-spacing: 0; }

    /* Thead */
    .pt-head th {
      font-size: 28px; font-weight: 700;
      padding: 20px 8px 18px; text-align: center;
      color: var(--blue-grey); letter-spacing: 2px;
    }
    .pt-head th:first-child { text-align: left; width: 188px; font-size: 0; color: transparent; }
    .pt-head th.is-hot {
      background: var(--navy); color: var(--yellow);
      border-radius: 18px 18px 0 0;
      padding: 20px 8px 12px; font-size: 30px;
    }
    .hot-sub {
      display: block; font-size: 20px; font-weight: 900;
      background: var(--yellow); color: var(--navy);
      border-radius: 16px; padding: 4px 14px;
      margin: 6px auto 0; width: fit-content; letter-spacing: 2px;
    }

    /* Tbody */
    .pt-body td {
      padding: 30px 10px; text-align: center; vertical-align: middle;
      border-bottom: 1px solid rgba(82,108,142,0.14);
    }
    .pt-body tr:last-child td { border-bottom: none; }
    .pt-body td:first-child {
      font-size: 58px; font-weight: 900; color: var(--navy);
      text-align: left; padding-left: 0; letter-spacing: 4px;
    }
    .pt-body td.price-val { font-size: 62px; font-weight: 900; color: var(--navy); }
    .pt-body td.price-val.is-hot {
      background: var(--navy); color: var(--yellow); font-size: 74px;
    }

    /* ── Notes ── */
    .notes-area { position: absolute; left: 112px; width: 1191px; top: 1560px; }
    .note-item { font-size: 28px; color: var(--blue-grey); line-height: 1.68; margin-bottom: 8px; }
    .note-item::before { content: "★ "; }
    .note-item strong { color: var(--navy); font-weight: 700; }

    /* ── Sep-2 (dynamic) ── */
    .sep-2 { position: absolute; left: 112px; width: 1191px; height: 7px; background: var(--yellow); border-radius: 4px; top: 1520px; }

    /* ── Footer ── */
    .footer {
      position: absolute; bottom: 0; left: 0; width: 1415px; height: 180px;
      background: var(--navy); display: flex; align-items: center; justify-content: center;
    }
    .wordmark {
      font-size: 62px; font-weight: 500; color: #fff;
      border-bottom: 10px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="header-band">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <div class="header-text">
          <div class="header-brand">宅心驗屋</div>
          <div class="header-service">驗屋｜裝修｜裝潢細清</div>
        </div>
        <div class="header-accent"></div>
      </div>

      <div class="project-section">
        <div class="project-eyebrow">社 區 專 屬 驗 屋 方 案</div>
        <strong id="projectName">建案專屬</strong>
      </div>

      <div class="sep sep-1"></div>

      <div class="section-header">
        <img class="mascot-icon" src="./assets/ip.png" alt="">
        <h2>驗屋報價</h2>
      </div>

      <div class="price-table-wrap">
        <table class="price-table">
          <thead class="pt-head" id="ptHead"></thead>
          <tbody class="pt-body" id="ptBody"></tbody>
        </table>
      </div>

      <div class="sep sep-2" id="sep2"></div>
      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1; // 預約滿10戶 永遠是 index 1

      var q = function (id) { return document.getElementById(id); };
      if (q("projectName")) q("projectName").textContent = data.projectName || "建案專屬";
      setImage(q("brandLogo"), q("logoFallback"), data.brandLogo || "./assets/logo.png");

      // Notes
      var noteList = q("noteList");
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement("p");
          p.className = "note-item";
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Table header
      var head = q("ptHead");
      if (head) {
        var tr = document.createElement("tr");
        var emptyTh = document.createElement("th");
        tr.appendChild(emptyTh);
        thresholds.forEach(function (t, i) {
          var th = document.createElement("th");
          if (i === HOT_IDX) {
            th.className = "is-hot";
            th.innerHTML = t + '<span class="hot-sub">★ 熱門方案</span>';
          } else {
            th.textContent = t;
          }
          tr.appendChild(th);
        });
        head.appendChild(tr);
      }

      // Table body
      var body = q("ptBody");
      if (body) {
        prices.forEach(function (row) {
          var tr = document.createElement("tr");
          var roomTd = document.createElement("td");
          roomTd.textContent = row.room;
          tr.appendChild(roomTd);
          (row.values || []).forEach(function (val, i) {
            var td = document.createElement("td");
            td.className = "price-val" + (i === HOT_IDX ? " is-hot" : "");
            td.textContent = (val !== null && val !== undefined) ? formatPrice(val) : "–";
            tr.appendChild(td);
          });
          body.appendChild(tr);
        });
      }

      // 動態調整分隔線與備註位置
      requestAnimationFrame(function () {
        var wrap = document.querySelector(".price-table-wrap");
        var sep2 = q("sep2");
        if (wrap && sep2 && noteList) {
          var tableBottom = wrap.offsetTop + wrap.offsetHeight;
          sep2.style.top = (tableBottom + 32) + 'px';
          noteList.style.top = (tableBottom + 68) + 'px';
        }
      });
    })();
  </script>
</body>
</html>
