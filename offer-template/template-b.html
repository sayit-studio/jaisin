<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1415, initial-scale=1">
  <title>宅心驗屋 一般促銷</title>
  <style>
    :root {
      --navy: #0D2340;
      --yellow: #FFD35A;
      --cream: #F1E7D6;
      --blue-grey: #526C8E;
      --light: #E9ECEF;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, .page-shell { width: 1415px; height: 2000px; overflow: hidden; background: var(--cream); }
    .poster {
      width: 1415px; height: 2000px; overflow: hidden;
      background: var(--cream);
      display: flex; flex-direction: column;
    }

    /* ── Navy header band ── */
    .header-band {
      background: var(--navy);
      padding: 44px 112px;
      display: flex; align-items: center; gap: 36px;
      flex-shrink: 0;
    }
    #brandLogo { width: 110px; height: 110px; object-fit: contain; flex-shrink: 0; }
    #logoFallback { display: none; }
    .header-text { display: flex; flex-direction: column; gap: 8px; }
    .header-brand {
      font-size: 52px; font-weight: 700; color: #fff; letter-spacing: 4px;
    }
    .header-service {
      font-size: 30px; font-weight: 500;
      color: rgba(255,255,255,0.6); letter-spacing: 5px;
    }

    /* ── Building name section ── */
    .name-section {
      text-align: center;
      padding: 52px 112px 44px;
      flex-shrink: 0;
    }
    .project-eyebrow {
      font-size: 26px; font-weight: 600;
      color: var(--blue-grey); letter-spacing: 10px; margin-bottom: 20px;
    }
    #projectName {
      display: block; font-size: 148px; font-weight: 900;
      color: var(--navy); letter-spacing: 16px; line-height: 1.0;
    }

    /* ── Yellow separator ── */
    .yellow-sep {
      height: 8px; background: var(--yellow);
      margin: 0 112px; border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── Price section header ── */
    .price-section-head {
      text-align: center; padding: 36px 0 28px;
      font-size: 38px; font-weight: 900;
      color: var(--navy); letter-spacing: 10px;
      flex-shrink: 0;
    }

    /* ── Three-column comparison ── */
    .compare-wrap {
      display: flex; gap: 28px;
      padding: 52px 80px 44px;
      align-items: flex-start;
      flex-shrink: 0;
    }

    /* Standard column */
    .compare-col {
      flex: 1; background: #fff;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 28px rgba(0,0,0,0.07);
    }
    .col-head {
      padding: 28px 24px 24px; text-align: center;
      font-size: 30px; font-weight: 700;
      color: var(--blue-grey); letter-spacing: 4px;
      border-bottom: 2px solid var(--light);
    }
    .price-row {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 10px;
      border-bottom: 1px solid rgba(82,108,142,0.1);
    }
    .price-row:last-child { border-bottom: none; }
    .room-label {
      font-size: 30px; font-weight: 700;
      color: var(--navy); letter-spacing: 4px;
    }
    .price-value {
      font-size: 68px; font-weight: 900;
      color: var(--navy); line-height: 1;
    }

    /* Featured column (10戶) */
    .compare-col.is-featured {
      background: var(--navy);
      border-radius: 20px;
      box-shadow: 0 16px 64px rgba(13,35,64,0.32);
      margin-top: -44px;
    }
    .featured-tag {
      background: var(--yellow); color: var(--navy);
      font-size: 28px; font-weight: 900;
      text-align: center; padding: 18px 0; letter-spacing: 4px;
    }
    .compare-col.is-featured .col-head {
      color: rgba(255,211,90,0.85); font-weight: 700;
      border-bottom-color: rgba(255,211,90,0.2);
      background: rgba(255,255,255,0.04);
    }
    .compare-col.is-featured .price-row {
      border-bottom-color: rgba(255,211,90,0.12);
    }
    .compare-col.is-featured .room-label { color: rgba(255,255,255,0.65); }
    .compare-col.is-featured .price-value { color: var(--yellow); font-size: 76px; }

    /* ── Notes ── */
    .notes-area {
      flex: 1; padding: 28px 112px;
      display: flex; flex-direction: column; gap: 18px;
      justify-content: center;
    }
    .note-item {
      font-size: 26px; font-weight: 500;
      color: var(--blue-grey); line-height: 1.75;
      padding-left: 22px; border-left: 4px solid var(--yellow);
    }
    .note-item strong { color: var(--navy); font-weight: 700; }

    /* ── Footer ── */
    .footer {
      background: var(--navy); flex-shrink: 0; height: 160px;
      display: flex; align-items: center;
      padding: 0 112px; gap: 32px;
    }
    .footer-logo { width: 72px; height: 72px; object-fit: contain; flex-shrink: 0; }
    .wordmark {
      font-size: 56px; font-weight: 500; color: #fff;
      border-bottom: 8px solid var(--yellow); padding-bottom: 4px; line-height: 1;
    }
    .wordmark strong { color: var(--yellow); font-weight: 700; }
    .is-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="poster" id="poster">

      <div class="header-band">
        <img id="brandLogo" alt="宅心驗屋">
        <div id="logoFallback"></div>
        <div class="header-text">
          <div class="header-brand">宅心驗屋</div>
          <div class="header-service">驗屋｜裝修｜裝潢細清</div>
        </div>
      </div>

      <div class="name-section">
        <div class="project-eyebrow">社 區 限 定 優 惠 方 案</div>
        <strong id="projectName">建案專屬</strong>
      </div>

      <div class="yellow-sep"></div>
      <div class="price-section-head">▌ 驗屋報價一覽 ▌</div>

      <div class="compare-wrap" id="compareWrap"></div>

      <div class="notes-area" id="noteList"></div>

      <footer class="footer">
        <img class="footer-logo" src="./assets/logo.png" alt="">
        <div class="wordmark">宅心<strong>驗屋</strong></div>
      </footer>

    </div>
  </div>

  <script>window.OFFER_SKIP_AUTO_RENDER = true;</script>
  <script src="./template.js"></script>
  <script>
    (function () {
      var data = getDataFromUrl();
      var thresholds = data.thresholds || [];
      var prices = data.prices || [];
      var HOT_IDX = 1;

      var q = function (id) { return document.getElementById(id); };
      if (q('projectName')) q('projectName').textContent = data.projectName || '建案專屬';
      setImage(q('brandLogo'), q('logoFallback'), data.brandLogo || './assets/logo.png');

      // Notes
      var noteList = q('noteList');
      if (noteList) {
        (data.notes || []).forEach(function (note) {
          var p = document.createElement('p');
          p.className = 'note-item';
          p.innerHTML = note;
          noteList.appendChild(p);
        });
      }

      // Three-column comparison
      var wrap = q('compareWrap');
      if (wrap) {
        thresholds.forEach(function (threshold, colIdx) {
          var isHot = (colIdx === HOT_IDX);
          var col = document.createElement('div');
          col.className = 'compare-col' + (isHot ? ' is-featured' : '');

          if (isHot) {
            var tag = document.createElement('div');
            tag.className = 'featured-tag';
            tag.textContent = '★ 熱門方案';
            col.appendChild(tag);
          }

          var head = document.createElement('div');
          head.className = 'col-head';
          head.textContent = threshold;
          col.appendChild(head);

          prices.forEach(function (row) {
            var val = (row.values || [])[colIdx];
            if (val === null || val === undefined) return;
            var rowEl = document.createElement('div');
            rowEl.className = 'price-row';
            rowEl.innerHTML =
              '<span class="room-label">' + row.room + '</span>' +
              '<span class="price-value">' + formatPrice(val) + '</span>';
            col.appendChild(rowEl);
          });

          wrap.appendChild(col);
        });
      }
    })();
  </script>
</body>
</html>
